<script>
// ============================================
// JavaScript.html — Notion-like Inline Editor
// ============================================

// ===== State =====
let _currentSheet   = null;
let _currentRowId   = null;
let _currentHeaders = [];
let _tableCache     = {};
let _treeData       = [];
let _meetingChart, _productChart;

// ===== Page metadata =====
const PAGE_META = {
  dashboard:  { label: 'ホーム',         emoji: '🏠' },
  products:   { label: '製品マスタ',     emoji: '📦' },
  meetings:   { label: '商談議事録',     emoji: '📝' },
  notes:      { label: 'ナレッジメモ',   emoji: '💡' },
  quotes:     { label: '見積書台帳',     emoji: '💴' },
  modeltree:  { label: 'ドキュメント管理', emoji: '🗂️' },
  ai:         { label: 'AI アシスタント', emoji: '✨' },
  analytics:  { label: '業務分析',       emoji: '📊' },
  career:     { label: 'キャリア目標',   emoji: '🎯' },
  notebooklm: { label: 'NotebookLM',    emoji: '📚' },
  pcbknowledge: { label: '基板ナレッジ', emoji: '🔧' },
};

// DB schema definitions (label → GAS function mapping)
const DB_CONFIG = {
  products: {
    icon: '📦', title: '製品マスタ',
    addFn: 'saveProduct',
    fields: [
      { key: 'name',      label: '製品名',     required: true },
      { key: 'price',     label: '価格',       type: 'number' },
      { key: 'status',    label: 'ステータス', type: 'select', options: ['販売中','廃番','開発中'] },
      { key: 'successor', label: '後継機種' },
      { key: 'reason',    label: '改廃理由' },
      { key: 'advantage', label: '競合優位性', type: 'textarea' },
    ]
  },
  meetings: {
    icon: '📝', title: '商談議事録',
    addFn: 'saveMeeting',
    fields: [
      { key: 'client',   label: '顧客名',       required: true },
      { key: 'related',  label: '関連基板・機種' },
      { key: 'summary',  label: '内容サマリ',   type: 'textarea' },
      { key: 'fulltext', label: '議事録全文',   type: 'textarea' },
    ]
  },
  notes: {
    icon: '💡', title: 'ナレッジメモ',
    addFn: 'saveNote',
    fields: [
      { key: 'tags',    label: 'タグ',   placeholder: '#製品知識 #営業Tips' },
      { key: 'content', label: 'メモ内容', required: true, type: 'textarea' },
    ]
  },
};

// ===== Init =====
document.addEventListener('DOMContentLoaded', () => {
  loadDashboard();
  loadTableData('products');
  loadTableData('meetings');
  loadTableData('notes');
  loadCareerData();
});

// =============================================
// NAVIGATION
// =============================================
function showTab(id) {
  document.querySelectorAll('.notion-page').forEach(p => {
    p.classList.add('d-none');
    p.classList.remove('active-page');
  });
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

  const page = document.getElementById('tab-' + id);
  if (page) { page.classList.remove('d-none'); page.classList.add('active-page'); }
  const nav = document.getElementById('nav-' + id);
  if (nav) nav.classList.add('active');

  const meta = PAGE_META[id] || { label: id, emoji: '📄' };
  document.getElementById('bc-current').textContent = meta.label;

  if (id === 'dashboard') loadDashboard();
  if (id === 'modeltree') loadModelTree();
  if (id === 'pcbknowledge') loadPCBTree();
  if (id === 'quotes')    loadQuotesTable();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}

// =============================================
// LOADING / TOAST
// =============================================
function showLoading() { document.getElementById('loader-dot').classList.remove('d-none'); }
function hideLoading()  { document.getElementById('loader-dot').classList.add('d-none'); }

function showToast(msg, isError = false) {
  const el = document.getElementById('toast-inline');
  el.textContent = isError ? '⚠️ ' + msg : '✓ ' + msg;
  el.style.color = isError ? 'var(--red)' : 'var(--green)';
  el.style.background = isError ? 'var(--red-soft)' : 'var(--green-soft)';
  el.classList.remove('d-none');
  setTimeout(() => el.classList.add('d-none'), 3500);
}

// =============================================
// DASHBOARD
// =============================================
function loadDashboard() {
  showLoading();
  google.script.run
    .withSuccessHandler(data => {
      hideLoading();
      document.getElementById('stat-products').textContent  = data.productsCount;
      document.getElementById('stat-meetings').textContent  = data.meetingsCount;
      document.getElementById('stat-notes').textContent     = data.notesCount;
      document.getElementById('stat-notebooks').textContent = data.notebookLMs.length;
      if (data.pcbModelsCount !== undefined) { const el = document.getElementById('stat-pcb'); if (el) el.textContent = data.pcbModelsCount + '機種 / ' + data.pcbBoardsCount + '基板 / ' + data.pcbPartsCount + '部品'; }

      // NotebookLM list
      const list = document.getElementById('notebooklm-list');
      list.innerHTML = '';
      if (!data.notebookLMs.length) {
        list.innerHTML = '<div class="empty-msg">NotebookLMの台帳がありません</div>';
      } else {
        data.notebookLMs.forEach(n => {
          list.innerHTML += `
            <div class="nlm-item">
              <div class="nlm-item-info">
                <div class="nlm-item-name">${esc(n['ノートブック名'])}</div>
                <div class="nlm-item-tag">${esc(n['関連製品'])}</div>
              </div>
              <a href="${n['共有URL']}" target="_blank" class="nlm-item-link">開く ↗</a>
            </div>`;
        });
      }
    })
    .withFailureHandler(err => { hideLoading(); showToast(err.message, true); })
    .getDashboardData();
}

// =============================================
// DATABASE TABLE LOAD & RENDER
// =============================================
function loadTableData(sheetName) {
  google.script.run
    .withSuccessHandler(data => {
      _tableCache[sheetName] = data;
      renderTable(sheetName, data);
      if (sheetName === 'products' || sheetName === 'meetings') renderCharts();
    })
    .withFailureHandler(err => showToast(err.message, true))
    .getAllDataForTables();
}

function loadQuotesTable() {
  google.script.run
    .withSuccessHandler(data => {
      const quoteData = data && data.quotes ? data.quotes : { headers: ['見積ID','親会社ID','会社名','見積番号','年月','DriveファイルID','Drive URL','ステータス','登録日時'], rows: [] };
      _tableCache['quotes'] = quoteData;
      renderRawTable('quotes', quoteData);
    })
    .withFailureHandler(err => showToast(err.message, true))
    .getAllDataForTables();
}

function renderTable(sheetName, allData) {
  const sheetData = allData[sheetName];
  if (!sheetData) return;
  renderRawTable(sheetName, sheetData);
}

function renderRawTable(sheetName, sheetData) {
  if (!sheetData || !sheetData.headers) return;
  const thead = document.getElementById('thead-' + sheetName);
  const tbody = document.getElementById('tbody-' + sheetName);
  if (!thead || !tbody) return;

  const headers = sheetData.headers;
  thead.innerHTML = '';
  tbody.innerHTML = '';

  // Header row
  const tr = document.createElement('tr');
  headers.forEach((h, i) => {
    const th = document.createElement('th');
    th.textContent = h;
    if (i === 0) th.style.width = '40px';
    tr.appendChild(th);
  });
  const thAct = document.createElement('th'); thAct.textContent = ''; thAct.style.width = '40px';
  tr.appendChild(thAct);
  thead.appendChild(tr);

  // Body rows
  const rows = sheetData.rows || [];
  updateRowCount(sheetName, rows.length);

  rows.forEach(row => {
    tbody.appendChild(buildRow(sheetName, row, headers));
  });
}

function buildRow(sheetName, row, headers) {
  const tr = document.createElement('tr');
  tr.dataset.id = row[0];

  row.forEach((val, idx) => {
    const td = document.createElement('td');

    if (idx === 0) {
      // Primary / title column — opens detail panel
      td.innerHTML = `
        <div class="cell-primary" onclick="openRowPanel('${sheetName}', '${esc(String(row[0]))}')">
          <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;">${esc(String(val))}</span>
          <i class="bi bi-arrow-up-right-square cell-open-icon"></i>
        </div>`;
    } else {
      // Inline editable cell
      const cellDiv = document.createElement('div');
      cellDiv.className = 'cell-wrap';
      cellDiv.contentEditable = 'true';
      cellDiv.textContent = val;
      cellDiv.spellcheck = false;
      cellDiv.dataset.original = val;
      cellDiv.dataset.header = headers[idx];
      cellDiv.dataset.id = row[0];
      cellDiv.dataset.sheet = sheetName;

      cellDiv.addEventListener('focus', () => {
        cellDiv.dataset.original = cellDiv.textContent;
      });
      cellDiv.addEventListener('blur', () => {
        if (cellDiv.textContent !== cellDiv.dataset.original) {
          saveCellInline(cellDiv, sheetName, row[0], headers[idx], cellDiv.textContent);
        }
      });
      cellDiv.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); cellDiv.blur(); }
        if (e.key === 'Escape') { cellDiv.textContent = cellDiv.dataset.original; cellDiv.blur(); }
      });
      td.appendChild(cellDiv);
    }
    tr.appendChild(td);
  });

  // Action td (placeholder for row hover actions)
  const tdAct = document.createElement('td');
  tdAct.style.width = '36px';
  tr.appendChild(tdAct);

  return tr;
}

function saveCellInline(cellEl, sheetName, id, header, newVal) {
  cellEl.classList.add('saving');
  google.script.run
    .withSuccessHandler(() => {
      cellEl.classList.remove('saving');
      cellEl.dataset.original = newVal;
      showToast('保存しました');
    })
    .withFailureHandler(err => {
      cellEl.classList.remove('saving');
      cellEl.textContent = cellEl.dataset.original;
      showToast('保存失敗: ' + err.message, true);
    })
    .updateRowData(sheetName, id, header, newVal);
}

function updateRowCount(sheetName, count) {
  const el = document.getElementById('count-' + sheetName);
  if (el) el.textContent = count + ' 件';
}

// Table filter
function filterTable(sheetName) {
  const kw    = document.getElementById('search-' + sheetName).value.toLowerCase();
  const tbody = document.getElementById('tbody-' + sheetName);
  if (!tbody) return;
  let shown = 0;
  tbody.querySelectorAll('tr').forEach(tr => {
    const match = tr.textContent.toLowerCase().includes(kw);
    tr.style.display = match ? '' : 'none';
    if (match) shown++;
  });
  updateRowCount(sheetName, shown);
}

// CSV export
function exportCSV(sheetName) {
  const data = _tableCache[sheetName];
  if (!data || !data.headers) { showToast('データがありません', true); return; }
  const rows = [data.headers.map(h => `"${h}"`).join(',')];
  (data.rows || []).forEach(r => rows.push(r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')));
  const blob = new Blob(['\uFEFF' + rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = sheetName + '.csv';
  a.click();
}

// =============================================
// CHARTS
// =============================================
function renderCharts() {
  const allData = _tableCache['products'] && _tableCache['meetings'] ? null : null;
  // Use meetings cache
  const meetings = _tableCache['meetings'];
  const products = _tableCache['products'];

  // Meeting trend
  if (meetings && meetings.rows) {
    const counts = {};
    meetings.rows.forEach(r => {
      const d = String(r[1] || '').split(' ')[0] || '?';
      counts[d] = (counts[d] || 0) + 1;
    });
    const labels = Object.keys(counts).slice(-10);
    const vals   = labels.map(k => counts[k]);
    if (_meetingChart) _meetingChart.destroy();
    _meetingChart = new Chart(document.getElementById('chart-meetings'), {
      type: 'line',
      data: { labels, datasets: [{ data: vals, borderColor: '#2383e2', backgroundColor: 'rgba(35,131,226,0.08)', tension: 0.4, fill: true, pointRadius: 3 }] },
      options: { responsive: true, plugins: { legend: { display: false } }, scales: { x: { ticks: { font: { size: 11 } } }, y: { ticks: { font: { size: 11 }, stepSize: 1 } } } }
    });
  }

  // Product status
  if (products && products.rows) {
    const counts = {};
    products.rows.forEach(r => { const s = r[3] || '未設定'; counts[s] = (counts[s] || 0) + 1; });
    if (_productChart) _productChart.destroy();
    _productChart = new Chart(document.getElementById('chart-products'), {
      type: 'doughnut',
      data: {
        labels: Object.keys(counts),
        datasets: [{ data: Object.values(counts), backgroundColor: ['#2383e2','#16a34a','#d97706','#dc2626','#7c3aed'], borderWidth: 0 }]
      },
      options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { font: { size: 11 }, boxWidth: 12 } } }, cutout: '65%' }
    });
  }
}

// =============================================
// ADD ROW MODAL
// =============================================
let _addRowSheet = null;

function openAddRow(sheetName) {
  const cfg = DB_CONFIG[sheetName];
  if (!cfg) return;
  _addRowSheet = sheetName;
  document.getElementById('add-row-icon').textContent = cfg.icon;
  document.getElementById('add-row-title').textContent = cfg.title + ' — 新規追加';

  const fields = document.getElementById('add-row-fields');
  fields.innerHTML = '';

  cfg.fields.forEach(f => {
    const row = document.createElement('div');
    row.className = 'form-prop-row';
    const label = document.createElement('span');
    label.className = 'form-prop-label';
    label.textContent = f.label + (f.required ? ' *' : '');
    row.appendChild(label);

    let input;
    if (f.type === 'textarea') {
      input = document.createElement('textarea');
      input.rows = 3;
      input.style.resize = 'vertical';
    } else if (f.type === 'select') {
      input = document.createElement('select');
      f.options.forEach(o => {
        const opt = document.createElement('option');
        opt.value = opt.textContent = o;
        input.appendChild(opt);
      });
    } else {
      input = document.createElement('input');
      input.type = f.type === 'number' ? 'number' : 'text';
    }
    input.className = 'form-prop-input';
    input.dataset.key = f.key;
    input.placeholder = f.placeholder || '';
    row.appendChild(input);
    fields.appendChild(row);
  });

  new bootstrap.Modal(document.getElementById('modal-add-row')).show();
}

function submitAddRow() {
  const cfg = DB_CONFIG[_addRowSheet];
  if (!cfg) return;

  const data = {};
  document.querySelectorAll('#add-row-fields .form-prop-input').forEach(el => {
    data[el.dataset.key] = el.value;
  });

  showLoading();
  google.script.run
    .withSuccessHandler(msg => {
      hideLoading();
      showToast(msg || '登録しました');
      bootstrap.Modal.getInstance(document.getElementById('modal-add-row')).hide();
      loadTableData(_addRowSheet);
    })
    .withFailureHandler(err => { hideLoading(); showToast(err.message, true); })
    [cfg.addFn](data);
}

// =============================================
// ROW DETAIL PANEL (Notion page expand)
// =============================================
function openRowPanel(sheetName, rowId) {
  const data = _tableCache[sheetName];
  if (!data) return;

  const row = data.rows.find(r => String(r[0]) === String(rowId));
  if (!row) return;

  _currentSheet   = sheetName;
  _currentRowId   = rowId;
  _currentHeaders = data.headers;

  const cfg  = DB_CONFIG[sheetName] || {};
  const meta = PAGE_META[sheetName] || {};

  // Breadcrumb
  document.getElementById('row-panel-bc').textContent = meta.label || sheetName;
  // Emoji
  document.getElementById('row-panel-emoji').textContent = cfg.icon || '📄';
  // Title (first column)
  const titleEl = document.getElementById('row-panel-title');
  titleEl.textContent = row[0] || '';

  // Properties
  const propsEl = document.getElementById('row-panel-props');
  propsEl.innerHTML = '';
  data.headers.forEach((header, idx) => {
    const val = row[idx] || '';
    const propRow = document.createElement('div');
    propRow.className = 'panel-prop-row';

    const keyEl = document.createElement('div');
    keyEl.className = 'panel-prop-key';
    keyEl.innerHTML = `<i class="bi bi-text-left" style="font-size:13px;"></i>${esc(header)}`;

    const valEl = document.createElement('div');
    valEl.className = 'panel-prop-val';
    valEl.contentEditable = idx !== 0 ? 'true' : 'false';
    valEl.textContent = String(val);
    valEl.spellcheck = false;
    valEl.dataset.header  = header;
    valEl.dataset.original = String(val);
    valEl.setAttribute('data-placeholder', '空');

    if (idx !== 0) {
      valEl.addEventListener('focus', () => { valEl.dataset.original = valEl.textContent; });
      valEl.addEventListener('blur', () => {
        if (valEl.textContent !== valEl.dataset.original) {
          valEl.classList.add('saving');
          google.script.run
            .withSuccessHandler(() => {
              valEl.classList.remove('saving');
              valEl.dataset.original = valEl.textContent;
              showToast('保存しました');
              loadTableData(sheetName);
            })
            .withFailureHandler(err => {
              valEl.classList.remove('saving');
              valEl.textContent = valEl.dataset.original;
              showToast('保存失敗: ' + err.message, true);
            })
            .updateRowData(sheetName, rowId, header, valEl.textContent);
        }
      });
      valEl.addEventListener('keydown', e => {
        if (e.key === 'Escape') { valEl.textContent = valEl.dataset.original; valEl.blur(); }
      });
    }

    propRow.appendChild(keyEl);
    propRow.appendChild(valEl);
    propsEl.appendChild(propRow);
  });

  const overlay = document.getElementById('row-panel-overlay');
  overlay.classList.remove('d-none');
}

function closeRowPanel(event) {
  if (event && event.target !== document.getElementById('row-panel-overlay')) return;
  document.getElementById('row-panel-overlay').classList.add('d-none');
  _currentSheet = _currentRowId = null;
}

function saveRowPanelTitle() {
  // Title is ID column (read-only in this context)
}

function deleteCurrentRow() {
  if (!_currentSheet || !_currentRowId) return;
  if (!confirm('この行を削除しますか？')) return;
  showLoading();
  google.script.run
    .withSuccessHandler(msg => {
      hideLoading();
      document.getElementById('row-panel-overlay').classList.add('d-none');
      showToast('削除しました');
      loadTableData(_currentSheet);
    })
    .withFailureHandler(err => { hideLoading(); showToast(err.message, true); })
    .deleteRowData(_currentSheet, _currentRowId);
}

// =============================================
// AI
// =============================================
function setAiMode(btn) {
  document.querySelectorAll('.ai-mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('ai-mode-value').value = btn.dataset.mode;
}

function submitAIQuery() {
  const query = document.getElementById('ai-query').value.trim();
  const mode  = document.getElementById('ai-mode-value').value || 'search';
  if (!query) { showToast('質問を入力してください', true); return; }
  const container = document.getElementById('ai-response-container');
  const resEl     = document.getElementById('ai-response');
  container.classList.remove('d-none');
  resEl.innerHTML = '<div style="color:var(--text-muted);font-size:14px;">生成中...</div>';
  showLoading();
  google.script.run
    .withSuccessHandler(resp => {
      hideLoading();
      resEl.innerHTML = mdToHtml(resp);
    })
    .withFailureHandler(err => {
      hideLoading();
      resEl.innerHTML = `<span style="color:var(--red);">エラー: ${esc(err.message)}</span>`;
    })
    .processAIQuery(query, mode);
}

function submitAnalytics() {
  const btn = document.getElementById('btn-analytics');
  btn.disabled = true;
  btn.textContent = '分析中...';
  showLoading();
  google.script.run
    .withSuccessHandler(result => {
      hideLoading();
      btn.disabled = false;
      btn.innerHTML = '⚡ 今すぐ分析 ＆ Chat 投稿';
      const el = document.getElementById('analytics-result');
      el.classList.remove('d-none');
      el.innerHTML = mdToHtml(result);
    })
    .withFailureHandler(err => {
      hideLoading();
      btn.disabled = false;
      btn.innerHTML = '⚡ 今すぐ分析 ＆ Chat 投稿';
      showToast(err.message, true);
    })
    .analyzeWorkspaceAndPushChat();
}

// DRIVE SYNC (simple knowledge sync)
// =============================================
function submitDriveSync() {
  showLoading();
  showToast('同期を開始しました...');
  google.script.run
    .withSuccessHandler(msg => { hideLoading(); showToast(msg); })
    .withFailureHandler(err => { hideLoading(); showToast(err.message, true); })
    .syncDriveKnowledge();
}

// =============================================
// MISC FORMS
// =============================================
function submitNotebookLM() {
  const data = {
    name:    document.getElementById('nlm-name').value,
    related: document.getElementById('nlm-related').value,
    url:     document.getElementById('nlm-url').value,
  };
  if (!data.name || !data.url) { showToast('名前とURLは必須です', true); return; }
  showLoading();
  google.script.run
    .withSuccessHandler(msg => {
      hideLoading(); showToast(msg);
      ['nlm-name','nlm-related','nlm-url'].forEach(id => document.getElementById(id).value = '');
      loadDashboard();
    })
    .withFailureHandler(err => { hideLoading(); showToast(err.message, true); })
    .saveNotebookLM(data);
}

// =============================================
// CAREER
// =============================================
function loadCareerData() {
  google.script.run
    .withSuccessHandler(data => {
      document.getElementById('career-stat-meetings').textContent  = data.stats.recentMeetings;
      document.getElementById('career-stat-knowledge').textContent = data.stats.knowledgeCreated;
      const container = document.getElementById('goal-list-container');
      container.innerHTML = '';
      if (!data.goals.length) {
        container.innerHTML = '<div class="empty-msg">目標が登録されていません</div>'; return;
      }
      data.goals.forEach(g => {
        const pct = parseInt(g['進捗(%)']) || 0;
        container.innerHTML += `
          <div class="goal-card">
            <div class="goal-header">
              <div class="goal-title">${esc(g['目標タイトル'])}</div>
              <div class="goal-pct">${pct}%</div>
            </div>
            <div class="goal-bar-track"><div class="goal-bar-fill" style="width:${pct}%"></div></div>
            <div class="goal-kpi">KPI: ${esc(g['測定指標(KPI)'])}</div>
          </div>`;
      });
    })
    .getCareerData();
}

function showModal(id) { new bootstrap.Modal(document.getElementById(id)).show(); }

function submitGoal() {
  const data = {
    title:    document.getElementById('goal-title').value,
    period:   document.getElementById('goal-period').value,
    kpi:      document.getElementById('goal-kpi').value,
    progress: document.getElementById('goal-progress').value,
    eval:     document.getElementById('goal-eval').value,
  };
  if (!data.title) { showToast('タイトルは必須です', true); return; }
  showLoading();
  google.script.run
    .withSuccessHandler(msg => {
      hideLoading();
      bootstrap.Modal.getInstance(document.getElementById('modal-goal')).hide();
      showToast(msg); loadCareerData();
    })
    .withFailureHandler(err => { hideLoading(); showToast(err.message, true); })
    .saveGoal(data);
}

// =============================================
// DRIVE SCAN MODAL
// =============================================
function showScanModal() {
  document.getElementById('scan-step-1').classList.remove('d-none');
  document.getElementById('scan-step-2').classList.add('d-none');
  document.getElementById('scan-step-3').classList.add('d-none');
  document.getElementById('scan-folder-id').value = '';
  document.getElementById('folder-validation-result').innerHTML = '';
  document.getElementById('folder-preview').classList.add('d-none');
  selectFolderType(1);
  new bootstrap.Modal(document.getElementById('modal-scan')).show();
}

function selectFolderType(t) {
  document.getElementById('folderType' + t).checked = true;
  [1,2].forEach(i => {
    const card = document.getElementById('type-card-' + i);
    card.classList.toggle('selected', i === t);
  });
}

function validateFolder() {
  const id = document.getElementById('scan-folder-id').value.trim();
  const res = document.getElementById('folder-validation-result');
  const prev = document.getElementById('folder-preview');
  if (!id) { res.innerHTML = '<span style="color:var(--red);">IDを入力してください</span>'; return; }
  res.innerHTML = '<span style="color:var(--text-muted);">検証中...</span>';
  google.script.run
    .withSuccessHandler(r => {
      if (r.valid) {
        res.innerHTML = `<span style="color:var(--green);">✓ ${esc(r.name)}</span>`;
        document.getElementById('folder-preview-name').textContent = r.name;
        prev.classList.remove('d-none');
      } else {
        res.innerHTML = `<span style="color:var(--red);">${esc(r.message)}</span>`;
        prev.classList.add('d-none');
      }
    })
    .withFailureHandler(err => { res.innerHTML = `<span style="color:var(--red);">${esc(err.message)}</span>`; })
    .validateDriveFolderId(id);
}

function startScan() {
  const id   = document.getElementById('scan-folder-id').value.trim();
  const type = document.querySelector('input[name="folderType"]:checked').value;
  if (!id) { showToast('フォルダIDを入力してください', true); return; }
  document.getElementById('scan-step-1').classList.add('d-none');
  document.getElementById('scan-step-2').classList.remove('d-none');
  google.script.run
    .withSuccessHandler(result => {
      document.getElementById('scan-step-2').classList.add('d-none');
      document.getElementById('scan-step-3').classList.remove('d-none');
      if (result.status === 'error') {
        document.getElementById('scan-result-title').textContent = 'エラー: ' + result.message;
        document.getElementById('scan-count-classified').textContent = '0';
        document.getElementById('scan-count-unclassified').textContent = '-';
        return;
      }
      document.getElementById('scan-count-classified').textContent   = result.classified;
      document.getElementById('scan-count-unclassified').textContent = result.unclassified;
      document.getElementById('scan-result-title').textContent = `完了 (${(result.companies||[]).join('・')})`;
      const cdiv = document.getElementById('scan-result-classified');
      cdiv.innerHTML = (result.details||[]).map(f =>
        `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px;">
          <span>${f.icon}</span>
          <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(f.name)}</span>
          <span style="font-size:11px;color:var(--text-muted);">${esc(f.company)} / ${esc(f.month)}</span>
        </div>`).join('') || '<p style="color:var(--text-muted);font-size:13px;">なし</p>';
      const uarea = document.getElementById('scan-result-unclassified-area');
      const udiv  = document.getElementById('scan-result-unclassified');
      if (result.unclassifiedFiles && result.unclassifiedFiles.length) {
        uarea.classList.remove('d-none');
        udiv.innerHTML = result.unclassifiedFiles.map(f =>
          `<div style="display:flex;gap:8px;padding:4px 0;font-size:13px;">
            <span>⚠️</span>
            <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(f.name)}</span>
            <a href="${f.url}" target="_blank" style="color:var(--accent);font-size:12px;">開く</a>
          </div>`).join('');
      } else { uarea.classList.add('d-none'); }
    })
    .withFailureHandler(err => {
      document.getElementById('scan-step-2').classList.add('d-none');
      document.getElementById('scan-step-3').classList.remove('d-none');
      document.getElementById('scan-result-title').textContent = 'エラー: ' + err.message;
    })
    .scanAndClassifyDriveFolder(id, type);
}

let _treeCache = [];

function loadModelTree() {
  const c = document.getElementById('model-tree-container');
  c.innerHTML = '<div class="empty-msg" style="padding:40px 0;"><div class="loading-dots" style="justify-content:center;"><span></span><span></span><span></span></div><div style="margin-top:12px;">読み込み中...</div></div>';
  google.script.run
    .withSuccessHandler(tree => {
      _treeCache = tree;
      populateTreeFilters(tree);
      renderTree(tree);
    })
    .withFailureHandler(err => {
      c.innerHTML = `<div class="empty-msg" style="color:var(--red);">エラー: ${esc(err.message)}</div>`;
    })
    .getModelTree();
}

function populateTreeFilters(tree) {
  const cSel = document.getElementById('tree-company-filter');
  const mSel = document.getElementById('tree-month-filter');
  const months = new Set();
  cSel.innerHTML = '<option value="">すべての会社</option>';
  tree.forEach(c => {
    cSel.innerHTML += `<option value="${c.id}">${esc(c.name)}</option>`;
    c.months.forEach(m => months.add(m.yearMonth));
  });
  mSel.innerHTML = '<option value="">すべての年月</option>';
  Array.from(months).sort().reverse().forEach(ym => {
    mSel.innerHTML += `<option value="${ym}">${esc(ym)}</option>`;
  });
}

function filterModelTree() {
  const kw  = document.getElementById('tree-search').value.toLowerCase();
  const cId = document.getElementById('tree-company-filter').value;
  const ym  = document.getElementById('tree-month-filter').value;
  let filtered = _treeCache;
  if (cId) filtered = filtered.filter(c => c.id === cId);
  if (ym)  filtered = filtered.map(c => ({ ...c, months: c.months.filter(m => m.yearMonth === ym) })).filter(c => c.months.length);
  if (kw)  filtered = filtered.filter(c =>
    c.name.toLowerCase().includes(kw) ||
    c.months.some(m => m.files.some(f => (f['ファイル名']||'').toLowerCase().includes(kw)))
  );
  renderTree(filtered);
}

function renderTree(tree) {
  const c = document.getElementById('model-tree-container');
  document.getElementById('tree-count-badge').textContent = tree.length + ' 社';
  if (!tree.length) {
    c.innerHTML = '<div class="empty-msg">該当なし</div>'; return;
  }
  c.innerHTML = tree.map(company => {
    const isHQ = ['本社','本店','HQ','headquarters'].some(k => company.name.toLowerCase().includes(k.toLowerCase()));
    const badgeClass = isHQ ? 'badge-hq' : 'badge-branch';
    const badgeLabel = isHQ ? '🏢 本社' : '🏭 支社';

    const monthsHtml = company.months.map(m => {
      const mId = 'mo-' + btoa(encodeURIComponent(company.id + m.yearMonth)).replace(/[=+/]/g,'');
      return `
        <div class="month-node">
          <div class="month-label" onclick="toggleEl('${mId}')">
            <i class="bi bi-calendar3" style="font-size:12px;"></i>
            ${esc(m.yearMonth)}
            <span class="month-count">${m.files.length}</span>
          </div>
          <div id="${mId}">
            ${m.files.map(f => renderFileRow(f)).join('')}
          </div>
        </div>`;
    }).join('');

    const quotesHtml = company.quotes.length ? `
      <div style="margin-top:12px; padding-top:10px; border-top:1px solid var(--border);">
        <div style="font-size:12px; font-weight:600; color:var(--text-muted); margin-bottom:6px;">見積書台帳 (${company.quotes.length}件)</div>
        ${company.quotes.map(q => `
          <div class="file-row">
            <span>💴</span>
            <span class="file-name" style="font-weight:500;">${esc(q['見積番号'])}</span>
            <span style="font-size:12px;color:var(--text-muted);">${esc(q['年月'])}</span>
            <span class="file-type-badge" style="background:${q['ステータス']==='確認済'?'var(--green)':'var(--text-muted)'};">${esc(q['ステータス'])}</span>
            ${q['Drive URL'] ? `<a href="${q['Drive URL']}" target="_blank" class="file-link">↗</a>` : ''}
          </div>`).join('')}
      </div>` : '';

    const bodyId = 'co-' + company.id;
    return `
      <div class="company-card">
        <div class="company-header" onclick="toggleEl('${bodyId}')">
          <span style="font-size:1.1em;">${isHQ ? '🏢' : '🏭'}</span>
          <span class="company-name">${esc(company.name)}</span>
          <span class="company-badge ${badgeClass}">${badgeLabel}</span>
          <span class="company-meta">${company.months.length}ヶ月 / ${company.totalDocs}件</span>
          ${company.url ? `<a href="${company.url}" target="_blank" onclick="event.stopPropagation();" class="notion-btn-sm ghost" style="padding:3px 8px;font-size:12px;">Drive ↗</a>` : ''}
          <i class="bi bi-chevron-down" style="font-size:12px;color:var(--text-muted);"></i>
        </div>
        <div class="company-body" id="${bodyId}">
          ${monthsHtml}
          ${quotesHtml}
        </div>
      </div>`;
  }).join('');
}

function renderFileRow(doc) {
  const isUnclassified = doc['ファイル種別'] === '【未分類】';
  const meta = FILE_TYPE_META[doc['ファイル種別']] || { color: 'var(--text-muted)', icon: '📄' };
  return `
    <div class="file-row">
      <span>${meta.icon}</span>
      <span class="file-name">${esc(doc['ファイル名'])}</span>
      <span class="file-type-badge" style="background:${meta.color};">${esc(doc['ファイル種別'])}</span>
      ${doc['Drive URL'] ? `<a href="${doc['Drive URL']}" target="_blank" class="file-link">↗</a>` : ''}
      ${isUnclassified ? `<button class="reclassify-btn" onclick="doReclassify('${doc['ドキュメントID']}','${esc(doc['ファイル名'])}')">分類する</button>` : ''}
    </div>`;
}

const FILE_TYPE_META = {
  '機種製品仕様書': { icon:'📋', color:'#2383e2' },
  '基板設計仕様書': { icon:'🔧', color:'#7c3aed' },
  '構成表(BOM)':   { icon:'📦', color:'#16a34a' },
  '見積書':        { icon:'💴', color:'#d97706' },
  '図面':          { icon:'📐', color:'#dc2626' },
  'マニュアル':    { icon:'📖', color:'#6b7280' },
  '試験・検査書':  { icon:'🧪', color:'#0891b2' },
  '【未分類】':    { icon:'⚠️', color:'#9ca3af' },
};

function toggleEl(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.display = el.style.display === 'none' ? '' : 'none';
}

function doReclassify(docId, fileName) {
  const types = Object.keys(FILE_TYPE_META).filter(t => t !== '【未分類】');
  const choice = prompt(`「${fileName}」の種別:\n\n` + types.map((t,i) => `${i+1}. ${t}`).join('\n') + '\n\n番号を入力:');
  if (!choice) return;
  const idx = parseInt(choice, 10) - 1;
  if (idx < 0 || idx >= types.length) { showToast('正しい番号を入力してください', true); return; }
  showLoading();
  google.script.run
    .withSuccessHandler(() => { hideLoading(); showToast('種別を変更しました'); loadModelTree(); })
    .withFailureHandler(err => { hideLoading(); showToast(err.message, true); })
    .reclassifyDocument(docId, types[idx]);
}

function mdToHtml(text) {
  if (!text) return '';
  return '<p>' + text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,     '<em>$1</em>')
    .replace(/\n\n/g,          '</p><p>')
    .replace(/\n- (.*)/g,      '<br>• $1')
    .replace(/\n/g,            '<br>') + '</p>';
}

function esc(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderPCBTree(tree) {
  const q   = (document.getElementById('pcb-search') || {}).value || '';
  const src = q ? tree.filter(m => JSON.stringify(m).toLowerCase().includes(q.toLowerCase())) : tree;
  const el  = document.getElementById('pcb-tree-container');
  if (!el) return;
  document.getElementById('pcb-count-badge').textContent = src.length + '機種';
  if (!src.length) {
    el.innerHTML = '<div class="empty-msg">機種データがありません。「機種追加」またはインポートから始めてください。</div>';
    return;
  }
  el.innerHTML = src.map(model => _renderModel(model)).join('');
}

function _renderModel(model) {
  const mid = esc(model['機種ID']);
  const boards = (model.boards || []).map(b => _renderBoard(b, model)).join('');

function _renderBoard(board, model) {

  refNo:'参照番号', partNumber:'部品番号', partName:'部品名',
  manufacturer:'メーカー', spec:'仕様', quantity:'数量', unit:'単位', leadTime:'リードタイム',
};

function showPCBModal(type, editId, ctxOrEdit) {
  _pcbModalCtx = { type, editId, ctx: ctxOrEdit || {} };
  const icons  = { model:'🏭', board:'🔧', config:'⚙️', part:'🔩' };
  const labels = { model:'機種', board:'基板', config:'基板構成', part:'部品' };
  document.getElementById('pcb-modal-icon').textContent  = icons[type];
  document.getElementById('pcb-modal-title').textContent = (editId ? '編集: ' : '追加: ') + labels[type];
  const edit = editId ? ctxOrEdit : {};
  document.getElementById('pcb-modal-fields').innerHTML = (PCB_FIELDS[type]||[]).map(f => {
    const val = (edit && (edit[f.key] !== undefined ? edit[f.key] : (edit[PCB_HDR_MAP[f.key]] !== undefined ? edit[PCB_HDR_MAP[f.key]] : ''))) || '';
    if (f.type === 'textarea') return `<div class="form-prop-row"><span class="form-prop-label">${f.label}</span><textarea class="form-prop-input" id="pcf-${f.key}" rows="3" placeholder="${f.ph||''}">${esc(String(val))}</textarea></div>`;
    if (f.type === 'select')   return `<div class="form-prop-row"><span class="form-prop-label">${f.label}</span><select class="form-prop-input" id="pcf-${f.key}">${(f.opts||[]).map(o=>`<option value="${o}"${o==val?' selected':''}>${o}</option>`).join('')}</select></div>`;
    if (f.type === 'number')   return `<div class="form-prop-row"><span class="form-prop-label">${f.label}</span><input type="number" class="form-prop-input" id="pcf-${f.key}" value="${esc(String(val))}" placeholder="${f.ph||''}"></div>`;
    return `<div class="form-prop-row"><span class="form-prop-label">${f.label}</span><input type="text" class="form-prop-input" id="pcf-${f.key}" value="${esc(String(val))}" placeholder="${f.ph||''}"></div>`;
  }).join('');
  new bootstrap.Modal(document.getElementById('modal-pcb')).show();
}

function submitPCBModal() {
  const { type, editId, ctx } = _pcbModalCtx;
  const payload = {};
  for (const f of (PCB_FIELDS[type]||[])) {
    const el = document.getElementById('pcf-' + f.key);
    if (!el) continue;
    if (f.req && !el.value.trim()) { showToast(f.label.replace(' *','') + 'は必須です', true); return; }
    payload[f.key] = el.value.trim();
  }
  if (type === 'board')  payload.modelId  = ctx.modelId  || '';
  if (type === 'config') payload.boardId  = ctx.boardId  || '';
  if (type === 'part')  { payload.boardId = ctx.boardId||''; payload.configId = ctx.configId||''; }
  if (editId) payload.id = editId;
  const fnMap = { model:'saveModel', board:'saveBoard', config:'saveConfig', part:'savePart' };
  showLoading();
  google.script.run
    .withSuccessHandler(res => { hideLoading(); bootstrap.Modal.getInstance(document.getElementById('modal-pcb')).hide(); showToast(res.message||'保存しました'); loadPCBTree(); })
    .withFailureHandler(err => { hideLoading(); showToast(err.message, true); })
    [fnMap[type]](payload);
}

function deletePCBNode(type, id, name) {
  if (!confirm(`「${name}」を削除しますか？\n※子データも全て削除されます`)) return;
  const fnMap = { model:'deleteModel', board:'deleteBoard', config:'deleteConfig', part:'deletePart' };
  showLoading();
  google.script.run
    .withSuccessHandler(() => { hideLoading(); showToast('削除しました'); loadPCBTree(); })
    .withFailureHandler(err => { hideLoading(); showToast(err.message, true); })
    [fnMap[type]](id);
}

// =============================================
// PCB IMPORT MODAL
// =============================================
let _impTab = 'csv';

function showPCBImportModal() {
  _populateBoardSelects();
  ['imp-result','imp-error'].forEach(id => document.getElementById(id).classList.add('d-none'));
  new bootstrap.Modal(document.getElementById('modal-pcb-import')).show();
}

function setImportTab(btn) {
  _impTab = btn.dataset.imp;
  document.querySelectorAll('#modal-pcb-import .ai-mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ['csv','drive','pdf','folder'].forEach(t => {
    const el = document.getElementById('imp-tab-' + t);
    if (el) el.classList.toggle('d-none', t !== _impTab);
  });
}

function _populateBoardSelects() {
  const opts = ['<option value="">― 選択 ―</option>'];
  (_pcbTree||[]).forEach(m => {
    (m.boards||[]).forEach(b => {
      opts.push(`<option value="${esc(b['基板ID'])}">[${esc(m['機種名'])}] ${esc(b['基板名'])} ${esc(b['改版番号']||'')}</option>`);
    });
  });
  ['imp-csv-board-sel','imp-drive-board-sel','imp-pdf-board-sel'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = opts.join('');
  });
}

function submitImport() {
  ['imp-result','imp-error'].forEach(id => document.getElementById(id).classList.add('d-none'));
  showLoading();
  const done = res => {
    hideLoading();
    const ok = res.status === 'ok' || (res.imported !== undefined && res.imported >= 0);
    const el = document.getElementById(ok ? 'imp-result' : 'imp-error');
    el.textContent = (ok ? '✅ ' : '⚠️ ') + (res.message||'エラーが発生しました');
    el.classList.remove('d-none');
    if (ok) loadPCBTree();
  };
  const fail = err => { hideLoading(); const el=document.getElementById('imp-error'); el.textContent='⚠️ '+err.message; el.classList.remove('d-none'); };

  if (_impTab === 'csv') {
    const csvText = document.getElementById('imp-csv-text').value.trim();
    const itype   = document.getElementById('imp-csv-type').value;
    const boardId = document.getElementById('imp-csv-board-sel').value;
    if (!csvText) { hideLoading(); showToast('CSVテキストを入力してください', true); return; }
    google.script.run.withSuccessHandler(done).withFailureHandler(fail).importCSV(csvText, itype, {boardId});
  } else if (_impTab === 'drive') {
    const fileId  = document.getElementById('imp-drive-fileid').value.trim();
    const sheet   = document.getElementById('imp-drive-sheet').value.trim();
    const itype   = document.getElementById('imp-drive-type').value;
    const boardId = document.getElementById('imp-drive-board-sel').value;
    if (!fileId) { hideLoading(); showToast('ファイルIDを入力してください', true); return; }
    google.script.run.withSuccessHandler(done).withFailureHandler(fail).importFromDriveFile(fileId, sheet||null, itype, {boardId});
  } else if (_impTab === 'pdf') {
    const fileId  = document.getElementById('imp-pdf-fileid').value.trim();
    const boardId = document.getElementById('imp-pdf-board-sel').value;
    if (!fileId) { hideLoading(); showToast('ファイルIDを入力してください', true); return; }
    google.script.run.withSuccessHandler(done).withFailureHandler(fail).importPDFtoBOM(fileId, {boardId});
  } else if (_impTab === 'folder') {
    const fid = document.getElementById('imp-folder-id').value.trim();
    if (!fid) { hideLoading(); showToast('フォルダIDを入力してください', true); return; }
    google.script.run.withSuccessHandler(done).withFailureHandler(fail).scanFolderAndClassifyPCB(fid);
  }
}

</script>
