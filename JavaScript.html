function showLoading() {
  const el = document.getElementById('loader');
  if (el) el.classList.remove('d-none');
}
function hideLoading() {
  const el = document.getElementById('loader');
  if (el) el.classList.add('d-none');
}
function showAlert(msg) {
  const alertBox = document.getElementById('alert-box');
  const msgEl = document.getElementById('alert-message');
  if (!alertBox || !msgEl) return;
  msgEl.innerText = msg;
  alertBox.classList.remove('d-none');
  setTimeout(() => closeAlert(), 5000);
}
function closeAlert() {
  const el = document.getElementById('alert-box');
  if (el) el.classList.add('d-none');
}

function submitAIQuery() {
  const query = document.getElementById('ai-query').value.trim();
  if (!query) { alert("質問内容を入力してください。"); return; }
  const mode = document.querySelector('input[name="aiMode"]:checked').value;
  const resContainer = document.getElementById('ai-response-container');
  const resDiv = document.getElementById('ai-response');
  resContainer.classList.remove('d-none');
  resDiv.innerHTML = '<div class="spinner-border text-primary spinner-border-sm me-2"></div><span class="text-muted">分析中...</span>';
  showLoading();
  google.script.run
    .withSuccessHandler(response => { hideLoading(); resDiv.innerHTML = parseMarkdownToHTML(response); })
    .withFailureHandler(err => { hideLoading(); resDiv.innerHTML = `<span class="text-danger fw-bold">エラー: ${err.message}</span>`; })
    .processAIQuery(query, mode);
}

function parseMarkdownToHTML(text) {
  if (!text) return "";
  return '<p>' + text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n- (.*)/g, '<br>&bull; $1')
    .replace(/\n\d+\. (.*)/g, '<br>&raquo; $1')
    .replace(/\n/g, '<br>') + '</p>';
}

function exportCSV(headId, bodyId, filename) {
  let csv = [];
  const thead = document.getElementById(headId);
  if (thead.children.length > 0) {
    const row = Array.from(thead.children[0].children).map(th => `"${th.innerText.replace(/"/g, '""')}"`);
    csv.push(row.join(','));
  }
  const tbody = document.getElementById(bodyId);
  for (let i = 0; i < tbody.children.length; i++) {
    const row = Array.from(tbody.children[i].children).map(td => `"${td.innerText.replace(/"/g, '""')}"`);
    csv.push(row.join(','));
  }
  const blob = new Blob(["\uFEFF" + csv.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement("a");
  link.setAttribute("href", URL.createObjectURL(blob));
  link.setAttribute("download", filename);
  link.style.visibility = 'hidden';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

let meetingChartInstance = null;
let productChartInstance = null;

function renderCharts(allData) {
  const meetings = allData.meetings.rows;
  let dateCounts = {};
  meetings.forEach(r => {
    let dStr = r[1] ? String(r[1]).split(' ')[0] : '不明';
    dateCounts[dStr] = (dateCounts[dStr] || 0) + 1;
  });
  const labelsM = Object.keys(dateCounts).slice(-10);
  const dataM = labelsM.map(k => dateCounts[k]);
  if (meetingChartInstance) meetingChartInstance.destroy();
  const ctxM = document.getElementById('chart-meetings');
  if (ctxM) meetingChartInstance = new Chart(ctxM, {
    type: 'line',
    data: { labels: labelsM, datasets: [{ label: '商談件数', data: dataM, borderColor: '#4361ee', backgroundColor: 'rgba(67,97,238,0.1)', tension: 0.4, fill: true }] },
    options: { responsive: true, maintainAspectRatio: false }
  });
  const products = allData.products.rows;
  let statusCounts = {};
  products.forEach(r => { let st = r[3] || '未設定'; statusCounts[st] = (statusCounts[st] || 0) + 1; });
  if (productChartInstance) productChartInstance.destroy();
  const ctxP = document.getElementById('chart-products');
  if (ctxP) productChartInstance = new Chart(ctxP, {
    type: 'doughnut',
    data: { labels: Object.keys(statusCounts), datasets: [{ data: Object.values(statusCounts), backgroundColor: ['#4cc9f0','#f72585','#3f37c9','#ffd166','#ef476f'] }] },
    options: { responsive: true, maintainAspectRatio: false, cutout: '60%' }
  });
}

function renderManagementTable(headId, bodyId, sheetData, sheetName) {
  const thead = document.getElementById(headId);
  const tbody = document.getElementById(bodyId);
  thead.innerHTML = "";
  tbody.innerHTML = "";
  if (!sheetData || sheetData.headers.length === 0) return;
  sheetData.headers.forEach(h => { const th = document.createElement('th'); th.textContent = h; thead.appendChild(th); });
  const thAction = document.createElement('th'); thAction.textContent = "操作"; thead.appendChild(thAction);
  sheetData.rows.forEach(row => {
    const tr = document.createElement('tr');
    const id = row[0];
    row.forEach((col, index) => {
      const td = document.createElement('td');
      td.textContent = col;
      if (index !== 0) {
        td.contentEditable = "true";
        td.style.cursor = "text";
        td.onblur = function() { if (td.dataset.original !== td.innerText) updateDataInline(sheetName, id, sheetData.headers[index], td.innerText, td); };
        td.onfocus = function() { td.dataset.original = td.innerText; td.style.backgroundColor = "#e9ecef"; };
      } else { td.classList.add('text-muted'); td.style.fontSize = "0.7em"; }
      tr.appendChild(td);
    });
    const tdAction = document.createElement('td');
    const audioBtn = document.createElement('button');
    audioBtn.className = 'btn btn-sm btn-outline-danger py-0 px-2 rounded-pill';
    audioBtn.innerHTML = '<i class="bi bi-headphones"></i> 音声化';
    const textCol = sheetData.headers.indexOf('テキスト内容');
    const fullCol = sheetData.headers.indexOf('議事録全文');
    const textVal = (textCol >= 0 ? row[textCol] : '') || (fullCol >= 0 ? row[fullCol] : '') || '';
    audioBtn.addEventListener('click', () => requestAudio(row[1] || 'ナレッジ', textVal));
    tdAction.appendChild(audioBtn);
    tr.appendChild(tdAction);
    tbody.appendChild(tr);
  });
}

function requestAudio(title, text) {
  if (!text || text.length < 10) { showAlert("音声化するためのテキストが不足しています。"); return; }
  showLoading();
  google.script.run
    .withSuccessHandler(msg => { hideLoading(); showAlert(msg); })
    .requestAudioConversion(title, text);
}

const IMPORT_TEMPLATES = {
  products: { label: '製品マスタ', headers: ['製品名','価格','ステータス','後継機種','改廃理由','競合優位性'], sample: [['XB-2200A','150,000円～','現行品','','','耐久性が従来比1.5倍']] },
  meetings: { label: '商談議事録', headers: ['顧客名','関連基板・機種','内容サマリ','議事録全文'], sample: [['株式会社サンプル','XB-2200A','価格交渉あり','詳細な議事録本文をここに']] },
  notes:    { label: 'ナレッジメモ', headers: ['タグ(Obsidianタグ等)','メモ内容'], sample: [['#営業トーク #競合','競合A社の最新基板は...']] },
  goals:    { label: 'キャリア目標', headers: ['対象期間','目標タイトル','測定指標(KPI)','進捗(%)','達成状況・自己評価'], sample: [['2024年度 上期','部品知識マスター','ナレッジ50件作成','30','現在進行中']] }
};
let importParsedData = null;

function downloadImportTemplate() {
  const type = document.querySelector('input[name="importType"]:checked').value;
  const tmpl = IMPORT_TEMPLATES[type]; if (!tmpl) return;
  const rows = [tmpl.headers, ...tmpl.sample];
  const csvContent = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = `template_${type}.csv`; a.click();
  URL.revokeObjectURL(url);
}

function handleImportDrop(event) {
  event.preventDefault();
  document.getElementById('import-dropzone').classList.remove('border-primary','bg-primary-subtle');
  const file = event.dataTransfer.files[0]; if (file) handleImportFile(file);
}

function handleImportFile(file) {
  if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'csv') {
    const reader = new FileReader();
    reader.onload = e => showImportPreview(parseCSV(e.target.result));
    reader.readAsText(file, 'UTF-8');
  } else if (ext === 'xlsx' || ext === 'xls') {
    if (typeof XLSX === 'undefined') { showAlert('Excelライブラリの読み込みに失敗しました。'); return; }
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const workbook = XLSX.read(e.target.result, { type: 'array' });
        const worksheet = workbook.Sheets[workbook.SheetNames[0]];
        showImportPreview(XLSX.utils.sheet_to_json(worksheet, { header:1, defval:'' }).map(r => r.map(c => String(c))));
      } catch(err) { showAlert('Excelファイルの読み込みに失敗しました: ' + err.message); }
    };
    reader.readAsArrayBuffer(file);
  } else { showAlert('対応していないファイル形式です。'); }
}

function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim() !== '');
  return lines.map(line => {
    const result = []; let current = ''; let inQuote = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { if (inQuote && line[i+1] === '"') { current += '"'; i++; } else { inQuote = !inQuote; } }
      else if (ch === ',' && !inQuote) { result.push(current.trim()); current = ''; }
      else { current += ch; }
    }
    result.push(current.trim()); return result;
  });
}

function showImportPreview(rows) {
  if (!rows || rows.length < 2) { showAlert('データが空またはヘッダー行のみです。'); return; }
  importParsedData = rows;
  const headers = rows[0]; const dataRows = rows.slice(1);
  const type = document.querySelector('input[name="importType"]:checked').value;
  const expectedHeaders = IMPORT_TEMPLATES[type].headers;
  const warningEl = document.getElementById('import-col-warning');
  const missing = expectedHeaders.filter(h => !headers.includes(h));
  if (missing.length > 0) { warningEl.classList.remove('d-none'); document.getElementById('import-col-warning-msg').textContent = `以下の列が見つかりません: ${missing.join(', ')}`; }
  else { warningEl.classList.add('d-none'); }
  document.getElementById('import-preview-head').innerHTML = headers.map(h => `<th>${h}</th>`).join('');
  document.getElementById('import-preview-body').innerHTML = dataRows.slice(0,5).map(row =>
    `<tr>${row.map(cell => `<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${cell}">${cell}</td>`).join('')}</tr>`
  ).join('');
  document.getElementById('import-row-count').textContent = `${dataRows.length}件のデータ`;
  document.getElementById('import-preview-section').classList.remove('d-none');
  document.getElementById('btn-import-execute').classList.remove('d-none');
}

function executeImport() {
  if (!importParsedData || importParsedData.length < 2) { showAlert('インポートするデータがありません。'); return; }
  const type = document.querySelector('input[name="importType"]:checked').value;
  const headers = importParsedData[0];
  const dataRows = importParsedData.slice(1).filter(r => r.some(c => c !== ''));
  const btn = document.getElementById('btn-import-execute');
  btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>インポート中...';
  showLoading();
  google.script.run
    .withSuccessHandler(msg => {
      hideLoading(); btn.disabled = false; btn.innerHTML = '<i class="bi bi-upload me-2"></i>データをインポートする';
      document.getElementById('import-result').innerHTML = `<div class="alert alert-success border-0 shadow-sm">${msg}</div>`;
      importParsedData = null;
      document.getElementById('import-preview-section').classList.add('d-none');
      btn.classList.add('d-none'); loadDashboardData();
    })
    .withFailureHandler(err => {
      hideLoading(); btn.disabled = false; btn.innerHTML = '<i class="bi bi-upload me-2"></i>データをインポートする';
      document.getElementById('import-result').innerHTML = `<div class="alert alert-danger border-0 shadow-sm">エラー: ${err.message}</div>`;
    })
    .importBulkData(type, headers, dataRows);
}

function importFromSpreadsheet() {
  const url = document.getElementById('sheet-url-input').value.trim();
  const tabName = document.getElementById('sheet-tab-name').value.trim();
  if (!url || !url.includes('spreadsheets/d/')) { showAlert('正しいスプレッドシートURLを入力してください。'); return; }
  const match = url.match(/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
  if (!match) { showAlert('URLからスプレッドシートIDを取得できませんでした。'); return; }
  const spreadsheetId = match[1];
  const btn = event.target; btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>読み込み中...';
  showLoading();
  google.script.run
    .withSuccessHandler(result => {
      hideLoading(); btn.disabled = false; btn.innerHTML = '<i class="bi bi-download me-1"></i>読み込む';
      if (result.rows && result.rows.length > 0) { showImportPreview([result.headers, ...result.rows]); showAlert(`${result.rows.length} 件を読み込みました。`); }
      else { showAlert('データが見つかりませんでした。'); }
    })
    .withFailureHandler(err => { hideLoading(); btn.disabled = false; btn.innerHTML = '<i class="bi bi-download me-1"></i>読み込む'; showAlert('エラー: ' + err.message); })
    .readFromSpreadsheet(spreadsheetId, tabName);
}

let selectedKeepColor = 'DEFAULT';
let editingEventId = null;

function initCalendar() {
  const now = new Date();
  calYear = now.getFullYear(); calMonth = now.getMonth(); calSelectedDate = toDateStr(now);
  loadCalendarEvents();
}
function toDateStr(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function todayStr() { return toDateStr(new Date()); }
function setCalView(v) {
  calView = v;
  document.getElementById('btn-view-month').className = v==='month'?'btn btn-sm btn-dark active':'btn btn-sm btn-outline-secondary';
  document.getElementById('btn-view-week').className = v==='week'?'btn btn-sm btn-dark active':'btn btn-sm btn-outline-secondary';
  renderCalendar();
}
function calPrev() {
  if (calView === 'month') { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } }
  else { const d = weekStartDate(); d.setDate(d.getDate()-7); calYear=d.getFullYear(); calMonth=d.getMonth(); calSelectedDate=toDateStr(d); }
  renderCalendar();
}
function calNext() {
  if (calView === 'month') { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } }
  else { const d = weekStartDate(); d.setDate(d.getDate()+7); calYear=d.getFullYear(); calMonth=d.getMonth(); calSelectedDate=toDateStr(d); }
  renderCalendar();
}
function calToday() {
  const now = new Date(); calYear=now.getFullYear(); calMonth=now.getMonth(); calSelectedDate=toDateStr(now);
  renderCalendar(); renderSidePanel(calSelectedDate);
}
function weekStartDate() {
  const ref = calSelectedDate ? new Date(calSelectedDate+'T00:00:00') : new Date();
  ref.setDate(ref.getDate() - ref.getDay()); return ref;
}
function renderCalendar() { if (calView==='month') renderMonthView(); else renderWeekView(); }

function renderMonthView() {
  document.getElementById('cal-month-view').classList.remove('d-none');
  document.getElementById('cal-week-view').classList.add('d-none');
  const MONTHS=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('cal-title').textContent = `${calYear}年 ${MONTHS[calMonth]}`;
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const prevDays = new Date(calYear, calMonth, 0).getDate();
  const today = todayStr();
  let html = '';
  let dayCount = 0;
  for (let i = firstDay-1; i >= 0; i--) { html += `<div class="cal-cell other-month"><span class="cal-day-num">${prevDays-i}</span></div>`; dayCount++; }
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = (firstDay+d-1)%7;
    let cls = 'cal-cell'+(dateStr===today?' today':'')+(dateStr===calSelectedDate?' selected':'')+(dow===0?' sun-col':'')+(dow===6?' sat-col':'');
    const evs = calEvents[dateStr] || [];
    let chips = evs.slice(0,3).map(e => {
      const chipCls = e.type==='meeting'?'chip-meeting':e.type==='note'?'chip-note':e.type==='keep'?'chip-keep':'chip-goal';
      const label = e.type==='meeting'?(e.client||e.title||'打合せ'):e.type==='note'?(e.tags||'メモ'):e.type==='keep'?(e.title||'Keep'):'目標';
      return `<span class="cal-event-chip ${chipCls}" title="${label}">${label}</span>`;
    }).join('');
    if (evs.length > 3) chips += `<span class="cal-event-chip" style="background:#f1f5f9;color:#94a3b8;">+${evs.length-3}</span>`;
    html += `<div class="${cls}" data-date="${dateStr}"><span class="cal-day-num">${d}</span>${chips}<button class="cal-add-btn" data-adddate="${dateStr}"><i class="bi bi-plus" style="font-size:.65rem;"></i></button></div>`;
    dayCount++;
  }
  for (let d = 1; d <= 42-dayCount; d++) { html += `<div class="cal-cell other-month"><span class="cal-day-num">${d}</span></div>`; }
  const calBody = document.getElementById('cal-body');
  calBody.innerHTML = html;
  // イベントリスナーをDOMに直接登録（onclick属性不使用）
  calBody.querySelectorAll('.cal-cell[data-date]').forEach(cell => {
    cell.addEventListener('click', () => selectCalDate(cell.getAttribute('data-date')));
  });
  calBody.querySelectorAll('.cal-add-btn[data-adddate]').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); openNewEventModal(btn.getAttribute('data-adddate')); });
  });
}

function renderWeekView() {
  document.getElementById('cal-month-view').classList.add('d-none');
  document.getElementById('cal-week-view').classList.remove('d-none');
  const wStart = weekStartDate();
  const days = [];
  for (let i = 0; i < 7; i++) { const d = new Date(wStart); d.setDate(d.getDate()+i); days.push(d); }
  const s = days[0], e = days[6];
  document.getElementById('cal-title').textContent = `${s.getFullYear()}年${s.getMonth()+1}月${s.getDate()}日 〜 ${e.getMonth()+1}月${e.getDate()}日`;
  const DOWS=['日','月','火','水','木','金','土'];
  const today = todayStr();
  const HOURS = Array.from({length:12},(_,i)=>i+8);
  let headerHtml = '<div class="week-time-col"><div class="week-day-header"></div>';
  HOURS.forEach(h => { headerHtml += `<div class="week-hour-label">${h}:00</div>`; });
  headerHtml += '</div>';
  let colsHtml = '';
  days.forEach((d, di) => {
    const ds = toDateStr(d);
    const evs = calEvents[ds] || [];
    let blocks = '';
    evs.forEach(ev => {
      if (!ev.time) return;
      const [hh, mm] = ev.time.split(':').map(Number);
      const topPx = (hh-8)*40 + (mm/60)*40 + 41;
      let heightPx = 40;
      if (ev.endtime) { const [eh, em] = ev.endtime.split(':').map(Number); heightPx = Math.max(20, ((eh*60+em)-(hh*60+mm))/60*40); }
      const wevCls = ev.type==='meeting'?'wev-meeting':ev.type==='note'?'wev-note':'wev-keep';
      const label = ev.type==='meeting'?(ev.client||ev.title||'打合せ'):(ev.tags||ev.title||'メモ');
      blocks += `<div class="week-event-block ${wevCls}" style="top:${topPx}px;height:${heightPx}px;" data-evdate="${ds}" data-evid="${ev.id}">${ev.time} ${label}</div>`;
    });
    let linesHtml = HOURS.map(()=>'<div class="week-hour-line"></div>').join('');
    colsHtml += `<div class="week-day-col" data-weekdate="${ds}"><div class="week-day-header ${d===today?'today-col':''}" style="cursor:pointer;"><div style="font-size:.85rem;">${DOWS[di]}</div><div style="font-size:1rem;font-weight:800;">${d.getDate()}</div></div><div style="position:relative;">${linesHtml}${blocks}</div></div>`;
  });
  const grid = document.getElementById('cal-week-grid');
  grid.innerHTML = headerHtml + colsHtml;
  grid.querySelectorAll('.week-day-col[data-weekdate]').forEach(col => {
    col.querySelector('.week-day-header').addEventListener('click', () => selectCalDate(col.getAttribute('data-weekdate')));
    col.querySelectorAll('.week-event-block[data-evdate]').forEach(block => {
      block.addEventListener('click', () => openEventDetail(block.getAttribute('data-evdate'), block.getAttribute('data-evid')));
    });
  });
}

function selectCalDate(dateStr) {
  calSelectedDate = dateStr; renderCalendar(); renderSidePanel(dateStr);
}

function renderSidePanel(dateStr) {
  const d = new Date(dateStr+'T00:00:00');
  const DAYS=['日','月','火','水','木','金','土'];
  document.getElementById('side-panel-date-title').textContent = `${d.getMonth()+1}月${d.getDate()}日（${DAYS[d.getDay()]}）の予定`;
  const evs = calEvents[dateStr] || [];
  const listEl = document.getElementById('side-event-list');
  if (evs.length === 0) {
    listEl.innerHTML = `<p class="text-muted small text-center py-3">この日の予定はありません<br><a href="#" data-adddate="${dateStr}">＋追加する</a></p>`;
    listEl.querySelector('a[data-adddate]').addEventListener('click', e => { e.preventDefault(); openNewEventModal(dateStr); });
    return;
  }
  listEl.innerHTML = evs.map(ev => {
    const badgeCls = ev.type==='meeting'?'bg-primary':ev.type==='note'?'bg-success':ev.type==='keep'?'bg-warning text-dark':'bg-secondary';
    const label = ev.type==='meeting'?(ev.client||'打合せ'):ev.type==='note'?(ev.tags||'メモ'):ev.type==='keep'?(ev.title||'Keep'):'目標';
    const time = ev.time?`<span class="text-muted" style="font-size:.72rem;">${ev.time}${ev.endtime?'〜'+ev.endtime:''}</span>`:'';
    const desc = ev.type==='meeting'?(ev.summary||''):(ev.type==='note'?(ev.content||'').substring(0,40):'');
    return `<div class="d-flex align-items-start gap-2 mb-2 p-2 rounded-3 bg-light side-ev-item" data-evdate="${dateStr}" data-evid="${ev.id}" style="cursor:pointer;">
      <span class="badge ${badgeCls} mt-1" style="font-size:.65rem;">${ev.type==='meeting'?'打合せ':ev.type==='note'?'メモ':ev.type==='keep'?'Keep':'目標'}</span>
      <div style="flex:1;min-width:0;"><div class="fw-bold" style="font-size:.82rem;">${label}</div>${time}${desc?`<div class="text-muted" style="font-size:.72rem;">${desc}</div>`:''}</div>
    </div>`;
  }).join('');
  listEl.querySelectorAll('.side-ev-item[data-evdate]').forEach(item => {
    item.addEventListener('click', () => openEventDetail(item.getAttribute('data-evdate'), item.getAttribute('data-evid')));
  });
}

function loadCalendarEvents() {
  showLoading();
  google.script.run
    .withSuccessHandler(data => {
      hideLoading(); calEvents = {};
      if (data && data.events) {
        data.events.forEach(ev => { if (!calEvents[ev.date]) calEvents[ev.date] = []; calEvents[ev.date].push(ev); });
      }
      renderCalendar(); renderSidePanel(calSelectedDate);
    })
    .withFailureHandler(err => { hideLoading(); showAlert("カレンダー読み込みエラー: " + err.message); })
    .getCalendarEvents();
}

function openNewEventModal(dateStr) {
  editingEventId = null;
  const date = dateStr || calSelectedDate || todayStr();
  document.getElementById('cal-ev-date').value = date;
  document.getElementById('cal-ev-time').value = '10:00';
  document.getElementById('cal-ev-endtime').value = '11:00';
  document.getElementById('cal-modal-title').textContent = '新しい予定を追加';
  switchEventType('meeting');
  ['cal-mtg-client','cal-mtg-title','cal-mtg-related','cal-mtg-summary','cal-mtg-fulltext'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
  new bootstrap.Modal(document.getElementById('modal-calendar')).show();
}

function switchEventType(type) {
  selectedEventType = type;
  ['meeting','note','keep'].forEach(t => {
    const f = document.getElementById(`form-${t}-section`);
    const n = document.getElementById(`etype-${t}`);
    if (f) f.classList.toggle('d-none', t !== type);
    if (n) n.classList.toggle('active', t === type);
  });
}

function setQuickTime(sh, sm, eh, em) {
  document.getElementById('cal-ev-time').value = `${String(sh).padStart(2,'0')}:${String(sm).padStart(2,'0')}`;
  document.getElementById('cal-ev-endtime').value = `${String(eh).padStart(2,'0')}:${String(em).padStart(2,'0')}`;
}

function saveCalendarEvent() {
  const date = document.getElementById('cal-ev-date').value;
  if (!date) { alert('日付を入力してください。'); return; }
  const payload = {
    date, time: document.getElementById('cal-ev-time').value,
    endtime: document.getElementById('cal-ev-endtime').value,
    type: selectedEventType, id: editingEventId
  };
  if (selectedEventType === 'meeting') {
    payload.client = document.getElementById('cal-mtg-client').value;
    payload.title = document.getElementById('cal-mtg-title').value;
    payload.related = document.getElementById('cal-mtg-related').value;
    payload.summary = document.getElementById('cal-mtg-summary').value;
    payload.fulltext = document.getElementById('cal-mtg-fulltext').value;
    if (!payload.client) { alert('顧客名を入力してください。'); return; }
  } else if (selectedEventType === 'note') {
    payload.tags = document.getElementById('cal-nt-tags').value;
    payload.content = document.getElementById('cal-nt-content').value;
  } else if (selectedEventType === 'keep') {
    payload.title = document.getElementById('cal-keep-title').value;
    payload.body = document.getElementById('cal-keep-body').value;
    payload.color = selectedKeepColor;
    payload.labels = document.getElementById('cal-keep-labels').value;
  }
  showLoading();
  google.script.run
    .withSuccessHandler(msg => {
      hideLoading();
      bootstrap.Modal.getInstance(document.getElementById('modal-calendar')).hide();
      showAlert(msg); loadCalendarEvents();
    })
    .withFailureHandler(err => { hideLoading(); showAlert('保存エラー: ' + err.message); })
    .saveCalendarEvent(payload);
}

function openEventDetail(dateStr, eventId) {
  const evs = calEvents[dateStr] || [];
  const ev = evs.find(e => String(e.id) === String(eventId));
  if (!ev) return;
  alert(`【${ev.type==='meeting'?'打合せ':ev.type==='note'?'メモ':'Keep'}】\n${ev.client||ev.tags||ev.title||''}\n${ev.summary||ev.content||''}`);
}

function selectKeepColor(el) {
  document.querySelectorAll('.keep-color-dot').forEach(d => d.style.border = '2px solid transparent');
  el.style.border = '2.5px solid #94a3b8';
  selectedKeepColor = el.getAttribute('data-color');
}

function syncKeepNotes() {
  const btn = document.getElementById('btn-sync-keep');
  btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>同期中...';
  google.script.run
    .withSuccessHandler(notes => {
      btn.disabled = false; btn.innerHTML = '<i class="bi bi-arrow-repeat me-1"></i>同期';
      keepNotes = notes || []; renderKeepNotes(keepNotes);
    })
    .withFailureHandler(err => { btn.disabled = false; btn.innerHTML = '<i class="bi bi-arrow-repeat me-1"></i>同期'; showAlert('Keep同期エラー: ' + err.message); })
    .getKeepNotes();
}

function filterKeepNotes(keyword) {
  const filtered = keyword ? keepNotes.filter(n => (n.title||'').includes(keyword)||(n.body||'').includes(keyword)) : keepNotes;
  renderKeepNotes(filtered);
}

function renderKeepNotes(notes) {
  const container = document.getElementById('keep-notes-container');
  const loadingMsg = document.getElementById('keep-loading-msg');
  if (loadingMsg) loadingMsg.classList.add('d-none');
  if (!notes || notes.length === 0) { container.innerHTML = '<p class="text-muted small text-center py-3">メモがありません</p>'; return; }
  container.innerHTML = notes.map(n =>
    `<div class="p-2 rounded-3 mb-2 small keep-note-item" data-keepid="${n.id}" style="background:${n.color||'#fef9c3'};cursor:pointer;">
      <div class="fw-bold">${n.title||'(タイトルなし)'}</div>
      <div class="text-muted" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${(n.body||'').substring(0,60)}</div>
    </div>`
  ).join('');
  container.querySelectorAll('.keep-note-item[data-keepid]').forEach(item => {
    item.addEventListener('click', () => selectKeepNoteForImport(item.getAttribute('data-keepid')));
  });
}

function selectKeepNoteForImport(noteId) {
  const note = keepNotes.find(n => n.id === noteId); if (!note) return;
  document.getElementById('cal-mtg-fulltext').value = note.body || '';
  if (!document.getElementById('cal-mtg-title').value) document.getElementById('cal-mtg-title').value = note.title || '';
  const hint = document.getElementById('keep-import-hint'); if (hint) hint.classList.remove('d-none');
}

function clearKeepImport() {
  const hint = document.getElementById('keep-import-hint'); if (hint) hint.classList.add('d-none');
}

</script>
