<script>
/**
 * JavaScript.html v2.0
 * ナレッジグラフ Hub — UI・グラフ描画・非同期処理コントローラー
 */

// ─── グローバル状態 ───────────────────────────────────
let networkInstance   = null;
let allGraphData      = { nodes: [], edges: [] };
let activeFilters     = { product: true, meeting: true, note: true, source: true };
let selectedNodeId    = null;
let currentAiMode     = 'search';
let meetingChartInst  = null;
let productChartInst  = null;

// ─── 初期化 ───────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  loadDashboard();
  loadTableData('products');
  loadTableData('meetings');
  loadTableData('notes');
  loadCareerData();
});

// ─── タブ切り替え ─────────────────────────────────────
function showTab(tabId) {
  document.querySelectorAll('.tab-pane').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));

  const target = document.getElementById('tab-' + tabId);
  if (target) target.classList.add('active');

  const navItem = document.getElementById('nav-' + tabId);
  if (navItem) navItem.classList.add('active');

  if (tabId === 'dashboard') loadDashboardData();
  if (tabId === 'graph') {
    // グラフは初回のみロードし、以降はリサイズ対応
    if (!networkInstance) {
      loadGraphData();
    } else {
      setTimeout(() => { if (networkInstance) networkInstance.fit(); }, 100);
    }
  }
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ─── ローディング ─────────────────────────────────────
function showLoading() {
  const el = document.getElementById('global-loader');
  el.classList.remove('done');
  el.classList.add('loading');
}

function hideLoading() {
  const el = document.getElementById('global-loader');
  el.classList.remove('loading');
  el.classList.add('done');
  setTimeout(() => el.classList.remove('done'), 500);
}

// ─── トースト通知 ─────────────────────────────────────
function showToast(msg, type = 'success') {
  const container = document.getElementById('toast-container');
  const icons = { success: '✅', error: '❌', info: 'ℹ️' };
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `<span>${icons[type] || '💬'}</span><span>${msg}</span>`;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(30px)';
    toast.style.transition = 'all 0.3s';
    setTimeout(() => toast.remove(), 300);
  }, 4000);
}

// ─── モーダル ─────────────────────────────────────────
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function openGoalModal() { openModal('modal-goal'); }

function showAddEdgeModal() {
  if (selectedNodeId) {
    document.getElementById('edge-source-id').value = selectedNodeId;
  }
  openModal('modal-edge');
}

// ─── ダッシュボード ───────────────────────────────────
function loadDashboardData() {
  showLoading();
  google.script.run
    .withSuccessHandler(data => {
      hideLoading();
      animateCounter('stat-products', data.productsCount);
      animateCounter('stat-meetings', data.meetingsCount);
      animateCounter('stat-notes',    data.notesCount);
      animateCounter('stat-edges',    data.edgesCount || 0);

      // バッジ更新
      const badge = document.getElementById('badge-edges');
      if (badge) badge.textContent = data.edgesCount || 0;

      // NotebookLMリスト
      const listEl = document.getElementById('notebooklm-list');
      listEl.innerHTML = '';
      if (data.notebookLMs.length === 0) {
        listEl.innerHTML = '<li class="item-list-item"><span style="color:var(--text-muted);font-size:12px;">台帳に登録されたノートブックはありません。</span></li>';
      } else {
        data.notebookLMs.forEach(n => {
          const li = document.createElement('li');
          li.className = 'item-list-item';
          li.innerHTML = `
            <div>
              <div style="font-size:13px;font-weight:600;margin-bottom:2px;">${n['ノートブック名']}</div>
              <span class="badge badge-green" style="font-size:10px;">${n['Enterprise連携フラグ']}</span>
            </div>
            <a href="${n['共有URL']}" target="_blank" class="btn btn-secondary btn-sm">開く ↗</a>
          `;
          listEl.appendChild(li);
        });
      }
    })
    .withFailureHandler(err => { hideLoading(); showToast('ダッシュボードのデータ取得に失敗: ' + err.message, 'error'); })
    .getDashboardData();
}

function animateCounter(id, target) {
  const el = document.getElementById(id);
  if (!el) return;
  const duration = 600;
  const start = performance.now();
  const from = parseInt(el.textContent) || 0;
  function step(now) {
    const elapsed = now - start;
    const progress = Math.min(elapsed / duration, 1);
    const ease = 1 - Math.pow(1 - progress, 3);
    el.textContent = Math.round(from + (target - from) * ease);
    if (progress < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ─── ════════════════════════════════════════
//     ナレッジグラフ (vis-network)
// ════════════════════════════════════════ ─
function loadGraphData() {
  const container = document.getElementById('knowledge-graph');
  container.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);flex-direction:column;gap:12px;"><div style="font-size:48px;">🕸️</div><div style="font-size:14px;">グラフデータを読み込んでいます...</div></div>`;
  showLoading();

  google.script.run
    .withSuccessHandler(data => {
      hideLoading();
      allGraphData = data;
      renderNetworkGraph(data.nodes, data.edges);
    })
    .withFailureHandler(err => {
      hideLoading();
      container.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--accent-red);flex-direction:column;gap:8px;"><div>❌ グラフの読み込みに失敗しました</div><div style="font-size:12px;color:var(--text-muted);">${err.message}</div></div>`;
    })
    .getGraphData();
}

function renderNetworkGraph(nodes, edges) {
  const container = document.getElementById('knowledge-graph');

  if (!nodes || nodes.length === 0) {
    container.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:16px;color:var(--text-muted);">
        <div style="font-size:56px;">🕸️</div>
        <div style="font-size:15px;font-weight:600;color:var(--text-secondary);">ナレッジがまだありません</div>
        <div style="font-size:13px;">サイドバーから製品・議事録・メモを登録してください</div>
      </div>`;
    return;
  }

  // ノードのvis-network用スタイル設定
  const nodeColorMap = {
    product: { background: '#1d5bd4', border: '#58a6ff', highlight: { background: '#2d6fe4', border: '#79c0ff' }, hover: { background: '#2564db', border: '#79c0ff' } },
    meeting: { background: '#c96d1b', border: '#f0883e', highlight: { background: '#d97a2a', border: '#ffab70' }, hover: { background: '#d07520', border: '#ffab70' } },
    note:    { background: '#1a7f37', border: '#3fb950', highlight: { background: '#2a8f47', border: '#56d364' }, hover: { background: '#259040', border: '#56d364' } },
    source:  { background: '#7e45c2', border: '#bc8cff', highlight: { background: '#8e55d2', border: '#d2a8ff' }, hover: { background: '#8a50ca', border: '#d2a8ff' } }
  };

  const visNodes = new vis.DataSet(nodes.map(n => ({
    id:    n.id,
    label: n.label,
    title: n.title,
    group: n.type,
    color: nodeColorMap[n.type] || nodeColorMap.note,
    font:  { color: '#ffffff', size: 12, face: 'Inter, sans-serif', bold: { color: '#ffffff', size: 13 } },
    shape: n.type === 'product' ? 'box' : n.type === 'meeting' ? 'ellipse' : n.type === 'source' ? 'diamond' : 'dot',
    size:  n.type === 'product' ? 20 : 18,
    borderWidth: 2,
    shadow: { enabled: true, color: 'rgba(0,0,0,0.5)', size: 8, x: 0, y: 4 },
    _type: n.type,
    _data: n.data
  })));

  const visEdges = new vis.DataSet(edges.map(e => ({
    id:     e.id,
    from:   e.from,
    to:     e.to,
    label:  e.label || '',
    arrows: { to: { enabled: true, scaleFactor: 0.6 } },
    color:  { color: 'rgba(139,148,158,0.5)', highlight: '#58a6ff', hover: '#79c0ff' },
    font:   { color: '#8b949e', size: 9, align: 'middle', strokeWidth: 0 },
    width:  1.5,
    smooth: { type: 'curvedCW', roundness: 0.2 }
  })));

  const options = {
    physics: {
      enabled: true,
      stabilization: { iterations: 200 },
      barnesHut: {
        gravitationalConstant: -8000,
        springConstant: 0.04,
        springLength: 160,
        damping: 0.5
      }
    },
    interaction: {
      hover: true,
      dragNodes: true,
      dragView: true,
      zoomView: true,
      tooltipDelay: 300,
      hideEdgesOnDrag: true
    },
    nodes: {
      scaling: { min: 14, max: 30 }
    },
    edges: {
      scaling: { min: 1, max: 3 }
    }
  };

  networkInstance = new vis.Network(container, { nodes: visNodes, edges: visEdges }, options);

  // クリックイベント
  networkInstance.on('click', params => {
    if (params.nodes.length > 0) {
      const nodeId = params.nodes[0];
      selectedNodeId = nodeId;
      fetchAndShowNodeDetail(nodeId, visNodes);
    } else {
      // 空白クリックでパネルを閉じない（ユーザビリティ考慮）
    }
  });

  // ダブルクリックで中心に
  networkInstance.on('doubleClick', params => {
    if (params.nodes.length > 0) {
      networkInstance.focus(params.nodes[0], { scale: 1.5, animation: { duration: 400, easingFunction: 'easeInOutQuad' } });
    }
  });

  // 安定化完了後にフィット
  networkInstance.once('stabilizationIterationsDone', () => {
    networkInstance.setOptions({ physics: { enabled: false } });
    networkInstance.fit({ animation: { duration: 600, easingFunction: 'easeInOutQuad' } });
  });
}

function fitGraph() {
  if (networkInstance) {
    networkInstance.fit({ animation: { duration: 600, easingFunction: 'easeInOutQuad' } });
  }
}

function reloadGraph() {
  if (networkInstance) {
    networkInstance.destroy();
    networkInstance = null;
  }
  loadGraphData();
}

// ─── グラフフィルタリング ─────────────────────────────
function toggleFilter(btn, type) {
  activeFilters[type] = !activeFilters[type];
  btn.classList.toggle('active', activeFilters[type]);

  if (!networkInstance || !allGraphData.nodes) return;

  // フィルタ後の表示ノードを再構築
  const filteredNodes = allGraphData.nodes.filter(n => activeFilters[n.type]);
  const filteredIds   = new Set(filteredNodes.map(n => n.id));
  const filteredEdges = allGraphData.edges.filter(e => filteredIds.has(e.from) && filteredIds.has(e.to));

  networkInstance.setData({
    nodes: new vis.DataSet(filteredNodes.map(n => ({
      id: n.id, label: n.label, title: n.title,
      color: getNodeColor(n.type), font: { color: '#fff', size: 12 },
      shape: getNodeShape(n.type), size: 18, borderWidth: 2,
      shadow: { enabled: true, color: 'rgba(0,0,0,0.5)', size: 8 }
    }))),
    edges: new vis.DataSet(filteredEdges.map(e => ({
      id: e.id, from: e.from, to: e.to, label: e.label || '',
      arrows: { to: { enabled: true, scaleFactor: 0.6 } },
      color: { color: 'rgba(139,148,158,0.5)', highlight: '#58a6ff' },
      font: { color: '#8b949e', size: 9 }, width: 1.5
    })))
  });
}

function getNodeColor(type) {
  const map = {
    product: { background:'#1d5bd4', border:'#58a6ff' },
    meeting: { background:'#c96d1b', border:'#f0883e' },
    note:    { background:'#1a7f37', border:'#3fb950' },
    source:  { background:'#7e45c2', border:'#bc8cff' }
  };
  return map[type] || map.note;
}

function getNodeShape(type) {
  if (type === 'product') return 'box';
  if (type === 'source')  return 'diamond';
  if (type === 'meeting') return 'ellipse';
  return 'dot';
}

// ─── グラフ検索 ───────────────────────────────────────
function searchGraph(query) {
  if (!networkInstance || !allGraphData.nodes) return;
  const q = query.toLowerCase().trim();

  if (!q) {
    // 全ノードを通常表示に戻す
    const allIds = allGraphData.nodes.map(n => n.id);
    networkInstance.selectNodes([]);
    return;
  }

  const matched = allGraphData.nodes
    .filter(n => (n.label + ' ' + (n.title || '')).toLowerCase().includes(q))
    .map(n => n.id);

  networkInstance.selectNodes(matched);
  if (matched.length === 1) {
    networkInstance.focus(matched[0], { scale: 1.5, animation: { duration: 400 } });
  }
}

// ─── ノード詳細パネル ─────────────────────────────────
function fetchAndShowNodeDetail(nodeId, visNodes) {
  const panel = document.getElementById('node-detail-panel');
  const panelBody = document.getElementById('panel-body');

  panel.classList.add('open');
  panelBody.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-muted);">読み込み中...</div>';

  google.script.run
    .withSuccessHandler(result => {
      if (!result) {
        panelBody.innerHTML = '<p style="font-size:12px;color:var(--text-muted);">詳細が見つかりませんでした。</p>';
        return;
      }

      // タイプバッジ
      const typeLabel = document.getElementById('panel-node-type');
      const typeMap = { products: ['product', '📦 製品'], meetings: ['meeting', '📄 議事録'], notes: ['note', '📝 メモ'], sources: ['source', '☁️ PDF/Doc'] };
      const [cls, lbl] = typeMap[result.sheetName] || ['note', 'ノード'];
      typeLabel.className = `panel-node-type ${cls}`;
      typeLabel.textContent = lbl;

      // タイトル
      const titleEl = document.getElementById('panel-node-title');
      const data = result.data;
      titleEl.textContent = data['製品名'] || data['顧客名'] || (String(data['メモ内容'] || '')).substring(0, 30) || data['ファイル名'] || nodeId;

      // ID表示（エッジ追加時にコピーしやすく）
      let html = `
        <div class="panel-field">
          <div class="panel-field-label">ノードID</div>
          <div style="font-size:10px;font-family:monospace;color:var(--text-muted);background:var(--bg-hover);padding:4px 8px;border-radius:4px;cursor:pointer;word-break:break-all;" onclick="copyText('${nodeId}')" title="クリックしてコピー">${nodeId}</div>
        </div>
      `;

      // 各フィールド表示
      Object.entries(data).forEach(([key, val]) => {
        if (key === 'ID' || !val || String(val).trim() === '') return;
        const valStr = String(val).substring(0, 300);
        html += `
          <div class="panel-field">
            <div class="panel-field-label">${key}</div>
            <div class="panel-field-value">${valStr}${String(val).length > 300 ? '...' : ''}</div>
          </div>
        `;
      });

      // 関連エッジ
      if (result.edges && result.edges.length > 0) {
        html += `<div class="panel-section-title">🔗 関連するノード (${result.edges.length}件)</div>`;
        result.edges.forEach(e => {
          const isSource = String(e['Source_ID']) === String(nodeId);
          const relatedId = isSource ? e['Target_ID'] : e['Source_ID'];
          const direction = isSource ? '→' : '←';
          html += `
            <div class="related-node-chip" onclick="focusNode('${relatedId}')">
              <span class="chip-icon">${direction}</span>
              <span class="chip-label">${String(relatedId).substring(0, 24)}...</span>
              <span class="chip-type">${e['Relation_Type'] || '関連'}</span>
            </div>
          `;
        });
      } else {
        html += `<div class="panel-section-title">🔗 関連するノード</div>`;
        html += `<div style="font-size:12px;color:var(--text-muted);">関係性はまだ登録されていません。</div>`;
      }

      panelBody.innerHTML = html;

      // エッジ追加フォームのターゲットドロップダウンを更新
      updateEdgeTargetDropdown(nodeId);
      document.getElementById('edge-form-panel').style.display = 'block';
    })
    .withFailureHandler(err => {
      panelBody.innerHTML = `<div style="color:var(--accent-red);font-size:12px;">エラー: ${err.message}</div>`;
    })
    .getNodeDetail(nodeId);
}

function updateEdgeTargetDropdown(sourceId) {
  const select = document.getElementById('edge-target-select');
  select.innerHTML = '<option value="">ターゲットノードを選択...</option>';
  (allGraphData.nodes || []).forEach(n => {
    if (String(n.id) === String(sourceId)) return;
    const opt = document.createElement('option');
    opt.value = n.id;
    opt.textContent = `[${n.type}] ${n.label}`;
    select.appendChild(opt);
  });
}

function closeDetailPanel() {
  document.getElementById('node-detail-panel').classList.remove('open');
  document.getElementById('edge-form-panel').style.display = 'none';
  selectedNodeId = null;
}

function focusNode(nodeId) {
  if (networkInstance) {
    networkInstance.focus(nodeId, { scale: 1.5, animation: { duration: 400 } });
    networkInstance.selectNodes([nodeId]);
    fetchAndShowNodeDetail(nodeId);
  }
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => showToast('IDをコピーしました', 'info'));
}

// ─── エッジ追加 ───────────────────────────────────────
function submitEdge() {
  const sourceId     = document.getElementById('edge-source-id').value.trim();
  const targetId     = document.getElementById('edge-target-id').value.trim();
  const relationType = document.getElementById('edge-relation').value.trim();

  if (!sourceId || !targetId) {
    showToast('SourceとTargetのIDを入力してください', 'error');
    return;
  }

  showLoading();
  google.script.run
    .withSuccessHandler(msg => {
      hideLoading();
      closeModal('modal-edge');
      showToast(msg, 'success');
      reloadGraph();
    })
    .withFailureHandler(err => { hideLoading(); showToast('エラー: ' + err.message, 'error'); })
    .saveEdge({ sourceId, targetId, relationType: relationType || '関連' });
}

function submitEdgeFromPanel() {
  const targetId     = document.getElementById('edge-target-select').value;
  const relationType = document.getElementById('edge-relation-input').value.trim();

  if (!selectedNodeId || !targetId) {
    showToast('ターゲットノードを選択してください', 'error');
    return;
  }

  showLoading();
  google.script.run
    .withSuccessHandler(msg => {
      hideLoading();
      showToast(msg, 'success');
      reloadGraph();
    })
    .withFailureHandler(err => { hideLoading(); showToast('エラー: ' + err.message, 'error'); })
    .saveEdge({ sourceId: selectedNodeId, targetId, relationType: relationType || '関連' });
}

function runAutoExtract() {
  showLoading();
  showToast('[[WikiLink]]とタグを解析中...', 'info');
  google.script.run
    .withSuccessHandler(msg => { hideLoading(); showToast(msg, 'success'); reloadGraph(); })
    .withFailureHandler(err => { hideLoading(); showToast('エラー: ' + err.message, 'error'); })
    .autoExtractEdges();
}

// ─── AI クエリ ────────────────────────────────────────
function setAiMode(btn) {
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentAiMode = btn.dataset.mode;
  document.getElementById('ai-mode-value').value = currentAiMode;
}

function submitAIQuery() {
  const query = document.getElementById('ai-query').value.trim();
  if (!query) { showToast('質問内容を入力してください', 'error'); return; }

  const container = document.getElementById('ai-response-container');
  const resDiv    = document.getElementById('ai-response');

  container.style.display = 'block';
  resDiv.innerHTML = '<div style="display:flex;align-items:center;gap:10px;color:var(--text-muted);"><span style="font-size:20px;">🤖</span> 社内データを分析して回答を生成しています...</div>';

  showLoading();
  google.script.run
    .withSuccessHandler(response => { hideLoading(); resDiv.innerHTML = parseMarkdown(response); })
    .withFailureHandler(err => { hideLoading(); resDiv.innerHTML = `<span style="color:var(--accent-red);">エラー: ${err.message}</span>`; })
    .processAIQuery(query, currentAiMode);
}

function parseMarkdown(text) {
  if (!text) return '';
  return '<p>' + text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code style="background:var(--bg-hover);padding:1px 5px;border-radius:3px;font-size:0.9em;">$1</code>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n- (.*)/g, '<br>• $1')
    .replace(/\n\d+\. (.*)/g, '<br>» $1')
    .replace(/\n/g, '<br>') + '</p>';
}

function submitNotebookLM() {

    related: document.getElementById('nlm-related').value,

  showLoading();
  google.script.run

function renderManagementTable(headId, bodyId, sheetData, sheetName) {
  const thead = document.getElementById(headId);
  const tbody = document.getElementById(bodyId);
  thead.innerHTML = tbody.innerHTML = '';

  if (!sheetData || sheetData.headers.length === 0) return;

  sheetData.headers.forEach(h => {
    const th = document.createElement('th');
    th.textContent = h;
    if (i === 0) th.style.width = '40px';
    tr.appendChild(th);
  });
  const thAct = document.createElement('th');
  thAct.textContent = '操作';
  thead.appendChild(thAct);

  sheetData.rows.forEach(row => {
    const tr = document.createElement('tr');
    const id = row[0];

    row.forEach((col, idx) => {
      const td = document.createElement('td');
      td.textContent = col;
      if (idx !== 0) {
        td.contentEditable = 'true';
        td.style.cursor = 'text';
        td.onblur = function() {
          if (td.dataset.original !== td.innerText) {
            updateDataInline(sheetName, id, sheetData.headers[idx], td.innerText, td);
          }
        };
        td.onfocus = function() { td.dataset.original = td.innerText; };
      } else {
        td.style.opacity = '0.4';
        td.style.fontSize = '10px';
        td.style.fontFamily = 'monospace';
      }
      tr.appendChild(td);
    });

    const tdAct = document.createElement('td');
    const textContent = row[sheetData.headers.indexOf('テキスト内容')] || row[sheetData.headers.indexOf('議事録全文')] || '';
    tdAct.innerHTML = `<button class="btn btn-danger btn-sm" onclick="requestAudio('${(row[1] || 'ナレッジ').replace(/'/g, "\\'")}', \`${textContent.substring(0, 500).replace(/`/g, '\\`')}\`)">🎧</button>`;
    tr.appendChild(tdAct);

  rows.forEach(row => {
    tbody.appendChild(buildRow(sheetName, row, headers));
  });
}

function updateDataInline(sheetName, id, headerName, newValue, tdEl) {
  tdEl.style.outline = '1px solid var(--accent-orange)';
  google.script.run
    .withSuccessHandler(res => {
      tdEl.style.outline = '';
      showToast(res, 'success');
      loadManagementData();
    })
    .withFailureHandler(err => {
      tdEl.style.outline = '1px solid var(--accent-red)';
      showToast('更新失敗: ' + err.message, 'error');
    })
    .updateRowData(sheetName, id, headerName, newValue);
}

function requestAudio(title, text) {
  if (!text || text.length < 10) { showToast('音声化するテキストが不足しています', 'error'); return; }
  showLoading();
  google.script.run
    .withSuccessHandler(msg => { hideLoading(); showToast(msg); })
    .withFailureHandler(err => { hideLoading(); showToast('エラー: ' + err.message, 'error'); })
    .requestAudioConversion(title, text);
}

function exportCSV(headId, bodyId, filename) {
  let csv = [];
  const thead = document.getElementById(headId);
  if (thead.children.length > 0) {
    const row = Array.from(thead.children).map(th => `"${th.innerText.replace(/"/g, '""')}"`);
    csv.push(row.join(','));
  }
  const tbody = document.getElementById(bodyId);
  for (let i = 0; i < tbody.children.length; i++) {
    const row = Array.from(tbody.children[i].children)
      .slice(0, -1) // 操作列を除外
      .map(td => `"${td.innerText.replace(/"/g, '""')}"`);
    csv.push(row.join(','));
  }
  const blob = new Blob(['\uFEFF' + csv.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename; a.style.display = 'none';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ─── グラフ (Chart.js / ダッシュボード) ──────────────
function renderCharts(allData) {
  const meetings = allData.meetings.rows || [];
  let dateCounts = {};
  meetings.forEach(r => {
    const dStr = r[1] ? String(r[1]).split(' ')[0] : '不明';
    dateCounts[dStr] = (dateCounts[dStr] || 0) + 1;
  });

  const labelsM = Object.keys(dateCounts).slice(-10);
  const dataM   = labelsM.map(k => dateCounts[k]);

  if (meetingChartInst) meetingChartInst.destroy();
  const ctxM = document.getElementById('chart-meetings')?.getContext('2d');
  if (ctxM) {
    meetingChartInst = new Chart(ctxM, {
      type: 'line',
      data: {
        labels: labelsM,
        datasets: [{
          label: '商談件数', data: dataM,
          borderColor: '#58a6ff',
          backgroundColor: 'rgba(88,166,255,0.1)',
          tension: 0.4, fill: true, pointBackgroundColor: '#58a6ff'
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#8b949e', font: { size: 11 } } } },
        scales: { x: { ticks: { color: '#8b949e', font: { size: 10 } }, grid: { color: '#21262d' } }, y: { ticks: { color: '#8b949e' }, grid: { color: '#21262d' } } }
      }
    });
  }

  const products = allData.products.rows || [];
  let statusCounts = {};
  products.forEach(r => { const st = r[3] || '未設定'; statusCounts[st] = (statusCounts[st] || 0) + 1; });

  if (productChartInst) productChartInst.destroy();
  const ctxP = document.getElementById('chart-products')?.getContext('2d');
  if (ctxP) {
    productChartInst = new Chart(ctxP, {
      type: 'doughnut',
      data: {
        labels: Object.keys(statusCounts),
        datasets: [{ data: Object.values(statusCounts), backgroundColor: ['#58a6ff','#3fb950','#f0883e','#bc8cff','#f85149'], borderWidth: 0 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false, cutout: '65%',
        plugins: { legend: { labels: { color: '#8b949e', font: { size: 11 }, boxWidth: 12 } } }
      }
    });
  }
}

function loadBoardFilesData() {
  const tbody = document.getElementById('table-board-body');
  tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:16px;">読み込み中...</td></tr>';

  google.script.run
    .withSuccessHandler(rows => {
      tbody.innerHTML = '';
      if (!rows || rows.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:20px;">データがありません。スキャンを実行してください。</td></tr>';
        return;
      }
      rows.forEach(r => {
        const tr = document.createElement('tr');

        const makeLink = (url) => {
          if (!url) return '<span style="color:var(--text-muted);font-size:11px;">—</span>';
          const short = url.length > 40 ? url.substring(0, 40) + '...' : url;
          return `<a href="${url}" target="_blank" style="color:var(--accent-blue);font-size:12px;text-decoration:none;" title="${url}">${short} ↗</a>`;
        };

        tr.innerHTML = `
          <td style="font-weight:700;color:var(--text-primary);">${r.boardId || '—'}</td>
          <td>${makeLink(r.bomUrl)}</td>
          <td>${makeLink(r.kousei)}</td>
          <td>${makeLink(r.otherUrl)}</td>
          <td style="font-size:11px;color:var(--text-muted);">${r.scanned || '—'}</td>
        `;
        tbody.appendChild(tr);
      });
      showToast(`基板DB: ${rows.length}件を読み込みました`, 'info');
    })
    .withFailureHandler(err => {
      tbody.innerHTML = `<tr><td colspan="5" style="color:var(--accent-red);padding:16px;">エラー: ${err.message}</td></tr>`;
    })
    .getBoardFilesData();
}
