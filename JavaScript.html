<script>
/**
 * 画面UI・非同期処理コントローラー
 */

// 初回読み込み時のダッシュボードデータ取得
document.addEventListener('DOMContentLoaded', () => {
  loadDashboardData();
});

// タブ切り替え処理
function showTab(tabId) {
  // すべてのタブコンテンツを非表示
  document.querySelectorAll('.tab-content').forEach(el => {
    el.classList.add('d-none');
    el.classList.remove('active-tab');
  });
  // ナビゲーションのActive解除
  document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));

  // 指定のタブを表示
  const target = document.getElementById('tab-' + tabId);
  if (target) {
    target.classList.remove('d-none');
    target.classList.add('active-tab');
  }
  
  // ナビゲーションをActive化
  const navItem = document.getElementById('nav-' + tabId);
  if (navItem) navItem.classList.add('active');

  // ダッシュボードを開いた場合は最新データをフェッチ
  if (tabId === 'dashboard') loadDashboardData();
}

// UIユーティリティ (ローディング・通知)
function showLoading() {
  document.getElementById('loader').classList.remove('d-none');
}

function hideLoading() {
  document.getElementById('loader').classList.add('d-none');
}

function showAlert(msg) {
  const alertBox = document.getElementById('alert-box');
  document.getElementById('alert-message').innerText = msg;
  alertBox.classList.remove('d-none');
  setTimeout(() => closeAlert(), 5000); // 5秒後に自動非表示
}

function closeAlert() {
  document.getElementById('alert-box').classList.add('d-none');
}

// -----------------------------------------------------------------
// データ取得系処理
// -----------------------------------------------------------------
function loadDashboardData() {
  showLoading();
  google.script.run
    .withSuccessHandler(data => {
      hideLoading();
      // 統計カウンター更新
      document.getElementById('stat-products').innerText = data.productsCount;
      document.getElementById('stat-meetings').innerText = data.meetingsCount;
      document.getElementById('stat-notes').innerText = data.notesCount;
      document.getElementById('stat-notebooks').innerText = data.notebookLMs.length;

      // NotebookLMリスト生成
      const listEl = document.getElementById('notebooklm-list');
      listEl.innerHTML = '';
      if(data.notebookLMs.length === 0) {
        listEl.innerHTML = '<li class="list-group-item text-muted">台帳に登録されたノートブックはありません。</li>';
      } else {
        data.notebookLMs.forEach(n => {
          const li = document.createElement('li');
          li.className = 'list-group-item d-flex justify-content-between align-items-center py-3';
          li.innerHTML = `
            <div>
              <h6 class="mb-1 fw-bold">${n['ノートブック名']}</h6>
              <span class="badge bg-light text-dark border">${n['関連製品']}</span>
              <span class="badge bg-success ms-1">${n['Enterprise連携フラグ']}</span>
            </div>
            <a href="${n['共有URL']}" target="_blank" class="btn btn-outline-primary btn-sm rounded-pill px-3">開く <i class="bi bi-box-arrow-up-right ms-1"></i></a>
          `;
          listEl.appendChild(li);
        });
      }
    })
    .withFailureHandler(err => {
      hideLoading();
      showAlert("ダッシュボードのデータ取得に失敗しました: " + err.message);
    })
    .getDashboardData();
}

// -----------------------------------------------------------------
// AI呼び出し処理
// -----------------------------------------------------------------
function submitAIQuery() {
  const query = document.getElementById('ai-query').value.trim();
  if(!query) {
    alert("質問内容を入力してください。");
    return;
  }
  
  const mode = document.querySelector('input[name="aiMode"]:checked').value;
  const resContainer = document.getElementById('ai-response-container');
  const resDiv = document.getElementById('ai-response');
  
  // UI状態更新
  resContainer.classList.remove('d-none');
  resDiv.innerHTML = '<div class="spinner-border text-primary spinner-border-sm me-2" role="status"></div><span class="text-muted">社内データを分析して回答を生成しています...</span>';
  
  showLoading();
  google.script.run
    .withSuccessHandler(response => {
      hideLoading();
      // 簡単なマークダウンタグをHTMLにパースして表示
      resDiv.innerHTML = parseMarkdownToHTML(response);
    })
    .withFailureHandler(err => {
      hideLoading();
      resDiv.innerHTML = `<span class="text-danger fw-bold">エラーが発生しました: ${err.message}</span>`;
    })
    .processAIQuery(query, mode);
}

// 簡易Markdownパーサー (マークダウンの装飾を見やすくする)
function parseMarkdownToHTML(text) {
  if(!text) return "";
  let html = text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')       // ボールド
    .replace(/\*(.*?)\*/g, '<em>$1</em>')                    // イタリック
    .replace(/\n\n/g, '</p><p>')                             // 段落
    .replace(/\n- (.*)/g, '<br>&bull; $1')                   // リスト簡略化
    .replace(/\n\d+\. (.*)/g, '<br>&raquo; $1')              // 番号付きリスト
    .replace(/\n/g, '<br>');                                 // 改行
  return `<p>${html}</p>`;
}

// -----------------------------------------------------------------
// データ登録系処理
// -----------------------------------------------------------------

    name: document.getElementById('prd-name').value,
    price: document.getElementById('prd-price').value,
    status: document.getElementById('prd-status').value,

    reason: document.getElementById('prd-reason').value,

    .saveProduct(data);

// -----------------------------------------------------------------
// Drive Sync処理
// -----------------------------------------------------------------
function submitDriveSync() {
  const btn = document.getElementById('btn-drivesync');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>同期中... (数分かかる場合があります)';
  showLoading();

  google.script.run
    .withSuccessHandler(msg => { 
      hideLoading(); 
      showAlert(msg); 
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-arrow-repeat me-2"></i>同期を実行する';
    })
    .withFailureHandler(err => { 
      hideLoading(); 
      showAlert("エラー: " + err.message); 
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-arrow-repeat me-2"></i>同期を実行する';
    })
    .syncDriveKnowledge();
}

// -----------------------------------------------------------------
// 分析・Chat発信処理
// -----------------------------------------------------------------
function submitAnalytics() {
  const btn = document.getElementById('btn-analytics');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>分析中... (数分かかります)';
  showLoading();

  const resContainer = document.getElementById('analytics-result-container');
  const resDiv = document.getElementById('analytics-result');
  resContainer.classList.remove('d-none');
  resDiv.innerHTML = '<div class="spinner-border text-info spinner-border-sm me-2" role="status"></div><span class="text-muted">Gmailとカレンダーを解析しています...</span>';

  google.script.run
    .withSuccessHandler(response => { 
      hideLoading(); 
      resDiv.innerHTML = parseMarkdownToHTML(response);
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-lightning-charge-fill me-2"></i>分析を再実行する';
      showAlert("自動分析が完了しました。設定があればChatにも送信されています。");
    })
    .withFailureHandler(err => { 
      hideLoading(); 
      resDiv.innerHTML = `<span class="text-danger fw-bold">エラーが発生しました: ${err.message}</span>`;
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-lightning-charge-fill me-2"></i>分析を実行する';
    })
    .analyzeWorkspaceAndPushChat();
}
// -----------------------------------------------------------------
// データ管理・インライン編集・出力・グラフ機能 (SaaS機能)
// -----------------------------------------------------------------

function exportCSV(headId, bodyId, filename) {
  let csv = [];
  const thead = document.getElementById(headId);
  if (thead.children.length > 0) {
    const row = Array.from(thead.children[0].children).map(th => `"${th.innerText.replace(/"/g, '""')}"`);
    csv.push(row.join(','));
  }
  const tbody = document.getElementById(bodyId);
  for (let i = 0; i < tbody.children.length; i++) {
    const row = Array.from(tbody.children[i].children).map(td => `"${td.innerText.replace(/"/g, '""')}"`);
    csv.push(row.join(','));
  }
  const blob = new Blob(["\uFEFF" + csv.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement("a");
  const url = URL.createObjectURL(blob);
  link.setAttribute("href", url);
  link.setAttribute("download", filename);
  link.style.visibility = 'hidden';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

let meetingChartInstance = null;
let productChartInstance = null;

function renderCharts(allData) {
  // 1. 商談議事録推移 
  const meetings = allData.meetings.rows;
  let dateCounts = {};
  meetings.forEach(r => {
    let dStr = r[1] ? String(r[1]).split(' ')[0] : '不明'; // 登録日時
    dateCounts[dStr] = (dateCounts[dStr] || 0) + 1;
  });
  
  const labelsM = Object.keys(dateCounts).slice(-10); // 直近10期
  const dataM = labelsM.map(k => dateCounts[k]);

  if (meetingChartInstance) meetingChartInstance.destroy();
  meetingChartInstance = new Chart(document.getElementById('chart-meetings'), {
    type: 'line',
    data: {
      labels: labelsM,
      datasets: [{
        label: '商談件数',
        data: dataM,
        borderColor: '#4361ee',
        backgroundColor: 'rgba(67, 97, 238, 0.1)',
        tension: 0.4,
        fill: true
      }]
    },
    options: { responsive: true, maintainAspectRatio: false }
  });

  // 2. 製品ステータス割合
  const products = allData.products.rows;
  let statusCounts = {};
  products.forEach(r => {
    let st = r[3] || '未設定'; // ステータス列
    statusCounts[st] = (statusCounts[st] || 0) + 1;
  });
  
  if (productChartInstance) productChartInstance.destroy();
  productChartInstance = new Chart(document.getElementById('chart-products'), {
    type: 'doughnut',
    data: {
      labels: Object.keys(statusCounts),
      datasets: [{
        data: Object.values(statusCounts),
        backgroundColor: ['#4cc9f0', '#f72585', '#3f37c9', '#ffd166', '#ef476f']
      }]
    },
    options: { responsive: true, maintainAspectRatio: false, cutout: '60%' }
  });
}

function loadManagementData() {
  google.script.run
    .withSuccessHandler(data => {
      renderManagementTable('table-products-head', 'table-products-body', data.products, 'products');
      renderManagementTable('table-meetings-head', 'table-meetings-body', data.meetings, 'meetings');
      renderCharts(data);
    })
    .getAllDataForTables();
}

function renderManagementTable(headId, bodyId, sheetData, sheetName) {
  const thead = document.getElementById(headId);
  const tbody = document.getElementById(bodyId);
  thead.innerHTML = "";
  tbody.innerHTML = "";
  
  if (!sheetData || sheetData.headers.length === 0) return;
  
  sheetData.headers.forEach(h => {
    const th = document.createElement('th');
    th.textContent = h;
    thead.appendChild(th);
  });
  
  sheetData.rows.forEach(row => {
    const tr = document.createElement('tr');
    const id = row[0]; // 0列目がID
    
    row.forEach((col, index) => {
      const td = document.createElement('td');
      td.textContent = col;
      if (index !== 0) {
        td.contentEditable = "true";
        td.style.cursor = "text";
        td.onblur = function() {
          if (td.dataset.original !== td.innerText) {
            updateDataInline(sheetName, id, sheetData.headers[index], td.innerText, td);
          }
        };
        td.onfocus = function() {
          td.dataset.original = td.innerText;
          td.style.backgroundColor = "#e9ecef";
        };
      } else {
        td.classList.add('text-muted');
        td.style.fontSize = "0.7em";
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

function updateDataInline(sheetName, id, headerName, newValue, tdElement) {
  tdElement.style.backgroundColor = '#fff3cd'; 
  google.script.run
    .withSuccessHandler(res => {
      tdElement.style.backgroundColor = 'transparent';
      showToast("更新: " + res);
      // 再読込してグラフ等も同期させる
      loadManagementData();
    })
    .withFailureHandler(err => {
      tdElement.style.backgroundColor = '#f8d7da';
      showAlert("更新失敗: " + err.message);
    })
    .updateRowData(sheetName, id, headerName, newValue);
}

// 簡易トースト通知用
function showToast(message) {
  const toast = document.createElement('div');
  toast.className = 'position-fixed bottom-0 end-0 p-3';
  toast.style.zIndex = "11";
  toast.innerHTML = `<div class="toast align-items-center text-white bg-success border-0 show" role="alert"><div class="d-flex"><div class="toast-body">${message}</div></div></div>`;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}
</script>
