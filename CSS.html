<style>
/* ==========================================
   CSS.html — Notion風 リデザイン
   ========================================== */

@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');

:root {
  --font-base: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

  /* Notionライクなカラーパレット */
  --bg-primary:    #FFFFFF;
  --bg-secondary:  #F7F6F3;
  --bg-card:       #FFFFFF;
  --bg-hover:      #EFEFEF;
  --border-color:  #E9E9E7;
  --border-subtle: #F0EFEC;

  /* サイドバー */
  --sidebar-bg:        #F7F6F3;
  --sidebar-border:    #E9E9E7;
  --sidebar-text:      #55534E;
  --sidebar-muted:     #9B9A97;
  --sidebar-active:    #1A1A1A;
  --sidebar-active-bg: rgba(0,0,0,0.06);

  /* アクセント */
  --accent-blue:   #2383E2;
  --accent-amber:  #CB912F;
  --accent-orange: #D9730D;
  --accent-green:  #0F7B6C;
  --accent-purple: #9065B0;
  --accent-red:    #E03E3E;
  --accent-cyan:   #0891B2;

  /* テキスト */
  --text-primary:   #1A1A1A;
  --text-secondary: #37352F;
  --text-muted:     #9B9A97;

  /* グラフノード */
  --node-product: #2383E2;
  --node-meeting: #D9730D;
  --node-note:    #0F7B6C;
  --node-source:  #9065B0;

  --radius-sm:  4px;
  --radius-md:  6px;
  --radius-lg:  8px;
  --sidebar-w:  220px;
  --transition: all 0.15s ease;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }

body {
  font-family: var(--font-base);
  background: var(--bg-primary);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
  height: 100%;
  overflow: hidden;
  font-size: 14px;
  line-height: 1.5;
}

#app-shell { display: flex; height: 100vh; overflow: hidden; }

/* ─── サイドバー ─── */
#sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--sidebar-bg);
  border-right: 1px solid var(--sidebar-border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  z-index: 100;
}

.sidebar-brand {
  padding: 12px 12px 10px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--sidebar-border);
}

.sidebar-brand .brand-icon {
  width: 26px; height: 26px;
  background: #1A1A1A;
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; flex-shrink: 0;
}

.sidebar-brand .brand-name {
  font-size: 13px; font-weight: 600; color: var(--text-primary); line-height: 1.2;
}
.sidebar-brand .brand-version { font-size: 10px; color: var(--sidebar-muted); }

.sidebar-nav {
  flex: 1; overflow-y: auto;
  padding: 6px 6px;
  scrollbar-width: thin;
  scrollbar-color: var(--border-color) transparent;
}

.sidebar-section-label {
  font-size: 11px; font-weight: 500;
  color: var(--sidebar-muted);
  padding: 10px 8px 3px;
}

.sidebar-item {
  display: flex; align-items: center; gap: 7px;
  padding: 5px 8px;
  border-radius: var(--radius-sm);
  color: var(--sidebar-text);
  font-size: 13px; font-weight: 400;
  cursor: pointer; transition: var(--transition);
  border: none; background: none;
  width: 100%; text-align: left;
  margin-bottom: 1px; min-height: 30px;
}
.sidebar-item:hover { background: rgba(0,0,0,0.05); color: var(--text-primary); }
.sidebar-item.active { background: var(--sidebar-active-bg); color: var(--sidebar-active); font-weight: 500; }

.sidebar-item .item-icon {
  font-size: 14px; flex-shrink: 0; width: 18px; text-align: center; opacity: 0.75;
}
.sidebar-item.active .item-icon { opacity: 1; }

.sidebar-item .item-badge {
  margin-left: auto;
  background: rgba(0,0,0,0.06); color: var(--sidebar-muted);
  font-size: 10px; font-weight: 600;
  padding: 1px 5px; border-radius: 8px;
}

.sidebar-footer {
  padding: 6px;
  border-top: 1px solid var(--sidebar-border);
}

/* ─── メインコンテンツ ─── */
#main-content {
  flex: 1; overflow-y: auto;
  background: var(--bg-primary);
  scrollbar-width: thin;
  scrollbar-color: var(--border-color) transparent;
}

.page-header {
  padding: 28px 32px 0;
  margin-bottom: 22px;
}
.page-header h1 {
  font-size: 22px; font-weight: 700; color: var(--text-primary); margin-bottom: 3px;
}
.page-header .page-desc {
  font-size: 13px; color: var(--text-muted); padding-bottom: 10px;
}
.page-body { padding: 0 32px 40px; }

/* ─── グラフビュー ─── */
#graph-container {
  position: relative; height: 100vh; display: flex; overflow: hidden;
}
#graph-canvas-wrapper {
  flex: 1; position: relative; background: #0D1117; overflow: hidden;
}
#knowledge-graph {
  width: 100%; height: 100%;
  background: radial-gradient(ellipse at center, #0d1f3c 0%, #0D1117 70%);
}
#graph-toolbar {
  position: absolute; top: 12px; left: 12px;
  display: flex; align-items: center; gap: 6px; z-index: 10; flex-wrap: wrap;
}
.graph-control-btn {
  background: rgba(247,246,243,0.94);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(0,0,0,0.14);
  color: #37352F; padding: 5px 10px;
  border-radius: var(--radius-sm);
  font-size: 12px; font-weight: 500;
  cursor: pointer; transition: var(--transition);
  display: flex; align-items: center; gap: 5px;
}
.graph-control-btn:hover { background: #fff; border-color: #1A1A1A; }
.graph-control-btn.active { background: #fff; border-color: rgba(0,0,0,0.3); font-weight: 600; }

#graph-legend {
  position: absolute; bottom: 16px; left: 16px;
  background: rgba(247,246,243,0.94); backdrop-filter: blur(8px);
  border: 1px solid rgba(0,0,0,0.1); border-radius: var(--radius-md);
  padding: 10px 14px; z-index: 10;
}
.legend-item { display: flex; align-items: center; gap: 7px; font-size: 11px; color: #55534E; margin-bottom: 4px; }
.legend-item:last-child { margin-bottom: 0; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ─── ノード詳細パネル ─── */
#node-detail-panel {
  width: 300px; min-width: 300px;
  background: var(--bg-card); border-left: 1px solid var(--border-color);
  overflow-y: auto; transform: translateX(100%);
  transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
  display: flex; flex-direction: column;
}
#node-detail-panel.open { transform: translateX(0); }
.panel-header {
  padding: 11px 13px; border-bottom: 1px solid var(--border-color);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; background: var(--bg-secondary); z-index: 5;
}
.panel-node-type {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 3px; margin-bottom: 3px;
}
.panel-node-type.product { background: rgba(35,131,226,0.1); color: #2383E2; }
.panel-node-type.meeting { background: rgba(217,115,13,0.1); color: #D9730D; }
.panel-node-type.note    { background: rgba(15,123,108,0.1); color: #0F7B6C; }
.panel-node-type.source  { background: rgba(144,101,176,0.1); color: #9065B0; }
.panel-close-btn {
  background: none; border: none; color: var(--text-muted);
  cursor: pointer; font-size: 16px; width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-sm); transition: var(--transition);
}
.panel-close-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.panel-body { padding: 13px; flex: 1; }
.panel-field { margin-bottom: 9px; }
.panel-field-label {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 2px;
}
.panel-field-value { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
.panel-field-value.highlight { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.panel-section-title {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--text-muted);
  border-bottom: 1px solid var(--border-color);
  padding-bottom: 5px; margin: 12px 0 7px;
}
.related-node-chip {
  display: flex; align-items: center; gap: 7px; padding: 6px 9px;
  background: var(--bg-secondary); border: 1px solid var(--border-color);
  border-radius: var(--radius-sm); margin-bottom: 5px; cursor: pointer; transition: var(--transition);
}
.related-node-chip:hover { border-color: #1A1A1A; background: var(--bg-hover); }
.related-node-chip .chip-label { font-size: 12px; color: var(--text-secondary); flex: 1; }
.related-node-chip .chip-type  { font-size: 10px; color: var(--text-muted); }
#edge-form-panel { padding: 11px 13px; border-top: 1px solid var(--border-color); background: var(--bg-secondary); }

/* ─── 統計カード ─── */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(150px,1fr)); gap: 12px; margin-bottom: 20px; }
.stat-card {
  background: var(--bg-card); border: 1px solid var(--border-color);
  border-radius: var(--radius-lg); padding: 16px;
  transition: var(--transition); position: relative; overflow: hidden;
}
.stat-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: var(--stat-color, #1A1A1A); opacity: 0.5;
}
.stat-card:hover { border-color: rgba(0,0,0,0.2); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.stat-label { font-size: 11px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; }
.stat-value { font-size: 28px; font-weight: 700; color: var(--text-primary); line-height: 1; margin-bottom: 3px; }
.stat-sub { font-size: 11px; color: var(--text-muted); }

/* ─── カード ─── */
.glass-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); overflow: hidden; }
.card-head {
  padding: 11px 16px; border-bottom: 1px solid var(--border-color);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--bg-secondary);
}
.card-head h2 { font-size: 13px; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 6px; }
.card-body { padding: 16px; }

/* ─── フォーム ─── */
.form-group { margin-bottom: 12px; }
.form-label { display: block; font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 4px; }
.form-control, .form-select {
  width: 100%; background: var(--bg-primary);
  border: 1px solid var(--border-color); border-radius: var(--radius-sm);
  color: var(--text-primary); padding: 7px 10px;
  font-size: 13px; font-family: var(--font-base); transition: var(--transition); outline: none;
}
.form-control::placeholder { color: var(--text-muted); }
.form-control:focus, .form-select:focus {
  border-color: #1A1A1A; box-shadow: 0 0 0 2px rgba(0,0,0,0.07);
}
textarea.form-control { resize: vertical; min-height: 80px; }

/* ─── ボタン ─── */
.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 14px; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500; font-family: var(--font-base);
  cursor: pointer; border: none; transition: var(--transition);
  text-decoration: none; line-height: 1.4;
}
.btn-primary { background: #1A1A1A; color: #fff; }
.btn-primary:hover { background: #2E2E2E; }
.btn-secondary { background: var(--bg-primary); color: var(--text-primary); border: 1px solid var(--border-color); }
.btn-secondary:hover { background: var(--bg-hover); border-color: #1A1A1A; }
.btn-danger { background: rgba(224,62,62,0.07); color: var(--accent-red); border: 1px solid rgba(224,62,62,0.2); }
.btn-danger:hover { background: rgba(224,62,62,0.13); }
.btn-success { background: rgba(15,123,108,0.08); color: var(--accent-green); border: 1px solid rgba(15,123,108,0.2); }
.btn-success:hover { background: rgba(15,123,108,0.15); }
.btn-sm   { padding: 4px 9px; font-size: 12px; }
.btn-icon { width: 28px; height: 28px; padding: 0; justify-content: center; }
.btn-block { width: 100%; justify-content: center; }

/* ─── トースト ─── */
#toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
.toast {
  background: var(--bg-card); border: 1px solid var(--border-color);
  border-radius: var(--radius-md); padding: 10px 14px;
  font-size: 13px; color: var(--text-primary);
  display: flex; align-items: center; gap: 8px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  animation: slideInRight 0.2s ease; max-width: 300px;
}
.toast.success { border-left: 3px solid var(--accent-green); }
.toast.error   { border-left: 3px solid var(--accent-red); }
.toast.info    { border-left: 3px solid var(--accent-blue); }
@keyframes slideInRight { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }

/* ─── ローディングバー ─── */
#global-loader {
  position: fixed; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, #2383E2, #9065B0); z-index: 9999;
  transform: scaleX(0); transform-origin: left; transition: transform 0.4s ease;
}
#global-loader.loading { transform: scaleX(0.7); animation: loadPulse 1.5s infinite; }
#global-loader.done { transform: scaleX(1); opacity: 0; transition: transform 0.2s, opacity 0.3s 0.2s; }
@keyframes loadPulse { 0%{transform:scaleX(0.1)} 50%{transform:scaleX(0.7)} 100%{transform:scaleX(0.9)} }

/* ─── テーブル ─── */
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th {
  background: var(--bg-secondary); color: var(--text-muted);
  font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
  padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border-color); position: sticky; top: 0;
}
.data-table td { padding: 9px 12px; border-bottom: 1px solid var(--border-subtle); color: var(--text-secondary); vertical-align: middle; }
.data-table tr:hover td { background: var(--bg-secondary); }
.data-table td[contenteditable="true"]:focus { background: var(--bg-hover); outline: 1px solid #1A1A1A; color: var(--text-primary); }

/* ─── AIレスポンス ─── */
.ai-response-area {
  background: var(--bg-secondary); border: 1px solid var(--border-color);
  border-radius: var(--radius-md); padding: 16px;
  font-size: 13px; line-height: 1.8; color: var(--text-secondary);
}
.ai-response-area strong { color: var(--text-primary); font-weight: 600; }

/* ─── モード切り替え ─── */
.mode-btn-group { display: flex; border: 1px solid var(--border-color); border-radius: var(--radius-sm); overflow: hidden; }
.mode-btn {
  flex: 1; padding: 6px 10px; background: transparent;
  border: none; border-right: 1px solid var(--border-color);
  color: var(--text-muted); font-size: 12px; font-weight: 500; font-family: var(--font-base);
  cursor: pointer; transition: var(--transition);
}
.mode-btn:last-child { border-right: none; }
.mode-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.mode-btn.active { background: var(--bg-hover); color: var(--text-primary); font-weight: 600; }

/* ─── バッジ ─── */
.badge { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 3px; font-size: 11px; font-weight: 500; }
.badge-blue   { background: rgba(35,131,226,0.1); color: var(--accent-blue); }
.badge-orange { background: rgba(217,115,13,0.1); color: var(--accent-orange); }
.badge-green  { background: rgba(15,123,108,0.1); color: var(--accent-green); }
.badge-purple { background: rgba(144,101,176,0.1); color: var(--accent-purple); }
.badge-red    { background: rgba(224,62,62,0.1);  color: var(--accent-red); }
.badge-amber  { background: rgba(203,145,47,0.1); color: var(--accent-amber); }

/* ─── タブ ─── */
.tab-pane         { display: none; }
.tab-pane.active  { display: block; animation: fadeUp 0.15s ease; }
#tab-graph.active { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
@keyframes fadeUp { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }

/* ─── プログレス ─── */
.progress-bar-wrap { background: var(--bg-hover); border-radius: 3px; height: 5px; margin-top: 5px; }
.progress-bar-fill { height: 100%; border-radius: 3px; background: #1A1A1A; transition: width 0.5s ease; }

/* ─── リスト ─── */
.item-list { list-style: none; }
.item-list-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 0; border-bottom: 1px solid var(--border-subtle); gap: 10px; font-size: 13px;
}
.item-list-item:last-child { border-bottom: none; }

/* ─── モーダル ─── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.3);
  backdrop-filter: blur(2px); z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.15s;
}
.modal-overlay.open { opacity: 1; pointer-events: auto; }
.modal-box {
  background: var(--bg-card); border: 1px solid var(--border-color);
  border-radius: var(--radius-lg); width: 90%; max-width: 460px; max-height: 88vh; overflow-y: auto;
  transform: scale(0.97); transition: transform 0.15s;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
}
.modal-overlay.open .modal-box { transform: scale(1); }
.modal-head { padding: 14px 18px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; }
.modal-head h3 { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.modal-body { padding: 18px; }
.modal-foot { padding: 12px 18px; border-top: 1px solid var(--border-color); background: var(--bg-secondary); display: flex; justify-content: flex-end; gap: 8px; }

.chart-wrapper { position: relative; height: 180px; }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #C0BFB8; }

#alert-box {
  display: none; padding: 9px 13px; border-radius: var(--radius-sm);
  font-size: 13px; margin-bottom: 12px;
  background: rgba(35,131,226,0.07); border: 1px solid rgba(35,131,226,0.2); color: #1A5EA6;
}

@media (max-width: 768px) {
  #sidebar { position: fixed; left: -240px; top: 0; height: 100%; transition: left 0.25s ease; z-index: 200; }
  #sidebar.open { left: 0; }
  #mobile-toggle { display: flex !important; }
  .page-header { padding: 16px 16px 0; }
  .page-body { padding: 0 16px 24px; }
  #node-detail-panel { width: 100%; position: absolute; top: 0; right: 0; bottom: 0; z-index: 50; }
}
@media (min-width: 769px) { #mobile-toggle { display: none !important; } }

#mobile-toggle { position: fixed; top: 10px; left: 10px; z-index: 300; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--radius-sm); }
</style>
