<style>
/* ==========================================
   CSS.html v2.0
   ナレッジグラフ Hub — ダークグラスモーフィズム
   ミニマリスト & Obsidianインスパイアード
   ========================================== */

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');

:root {
  --font-base: 'Inter', 'Noto Sans JP', sans-serif;

  /* ダークカラーパレット */
  --bg-primary:    #0d1117;
  --bg-secondary:  #161b22;
  --bg-card:       #21262d;
  --bg-hover:      #30363d;
  --border-color:  #30363d;
  --border-subtle: #21262d;

  /* アクセントカラー */
  --accent-blue:   #58a6ff;
  --accent-orange: #f0883e;
  --accent-green:  #3fb950;
  --accent-purple: #bc8cff;
  --accent-red:    #f85149;
  --accent-cyan:   #39d353;

  /* テキスト */
  --text-primary:  #f0f6fc;
  --text-secondary:#8b949e;
  --text-muted:    #6e7681;

  /* グラフノード色 */
  --node-product:  #1d5bd4;
  --node-meeting:  #c96d1b;
  --node-note:     #1a7f37;
  --node-source:   #7e45c2;

  /* グラスモーフィズム */
  --glass-bg:      rgba(33, 38, 45, 0.85);
  --glass-border:  rgba(255, 255, 255, 0.08);
  --glass-blur:    12px;

  --radius-sm:  6px;
  --radius-md:  10px;
  --radius-lg:  16px;
  --sidebar-w:  240px;
  --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ─── リセット & ベース ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { height: 100%; scroll-behavior: smooth; }

body {
  font-family: var(--font-base);
  background-color: var(--bg-primary);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
  height: 100%;
  overflow: hidden; /* レイアウト最優先 */
}

/* ─── アプリシェル (サイドバー + メイン) ─── */
#app-shell {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ─── サイドバー ─── */
#sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--bg-secondary);
  border-right: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width 0.25s ease;
  z-index: 100;
}

.sidebar-brand {
  padding: 20px 16px 16px;
  border-bottom: 1px solid var(--border-color);
  display: flex;
  align-items: center;
  gap: 10px;
}

.sidebar-brand .brand-icon {
  width: 34px;
  height: 34px;
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.sidebar-brand .brand-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.2;
}

.sidebar-brand .brand-version {
  font-size: 10px;
  color: var(--text-muted);
}

.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 12px 8px;
  scrollbar-width: thin;
  scrollbar-color: var(--border-color) transparent;
}

.sidebar-section-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 8px 8px 4px;
}

.sidebar-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
  text-decoration: none;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  margin-bottom: 2px;
}

.sidebar-item:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.sidebar-item.active {
  background: rgba(88, 166, 255, 0.15);
  color: var(--accent-blue);
  font-weight: 600;
}

.sidebar-item .item-icon {
  font-size: 14px;
  flex-shrink: 0;
  width: 16px;
  text-align: center;
}

.sidebar-item .item-badge {
  margin-left: auto;
  background: var(--bg-hover);
  color: var(--text-muted);
  font-size: 10px;
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 10px;
}

.sidebar-item.active .item-badge {
  background: rgba(88, 166, 255, 0.25);
  color: var(--accent-blue);
}

.sidebar-footer {
  padding: 12px 8px;
  border-top: 1px solid var(--border-color);
}

/* ─── メインコンテンツ ─── */
#main-content {
  flex: 1;
  overflow-y: auto;
  background: var(--bg-primary);
  scrollbar-width: thin;
  scrollbar-color: var(--border-color) transparent;
}

.page-header {
  padding: 24px 28px 0;
  border-bottom: 1px solid var(--border-color);
  background: var(--bg-secondary);
  margin-bottom: 24px;
}

.page-header h1 {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 4px;
}

.page-header .page-desc {
  font-size: 13px;
  color: var(--text-secondary);
  padding-bottom: 14px;
}

.page-body {
  padding: 0 28px 32px;
}

/* ─── ナレッジグラフビュー ─── */
#graph-container {
  position: relative;
  height: calc(100vh - 60px);
  display: flex;
  overflow: hidden;
}

#graph-canvas-wrapper {
  flex: 1;
  position: relative;
  background: var(--bg-primary);
  overflow: hidden;
}

#knowledge-graph {
  width: 100%;
  height: 100%;
  background: radial-gradient(ellipse at center, #0d1f3c 0%, var(--bg-primary) 70%);
}

/* グラフコントロールツールバー */
#graph-toolbar {
  position: absolute;
  top: 12px;
  left: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  z-index: 10;
  flex-wrap: wrap;
}

.graph-control-btn {
  background: var(--glass-bg);
  backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--glass-border);
  color: var(--text-primary);
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  gap: 6px;
}

.graph-control-btn:hover {
  background: var(--bg-hover);
  border-color: var(--accent-blue);
  color: var(--accent-blue);
}

.graph-control-btn.active {
  background: rgba(88, 166, 255, 0.15);
  border-color: var(--accent-blue);
  color: var(--accent-blue);
}

/* 凡例 */
#graph-legend {
  position: absolute;
  bottom: 16px;
  left: 16px;
  background: var(--glass-bg);
  backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-md);
  padding: 10px 14px;
  z-index: 10;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--text-secondary);
  margin-bottom: 4px;
}

.legend-item:last-child { margin-bottom: 0; }

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ノード詳細パネル */
#node-detail-panel {
  width: 320px;
  min-width: 320px;
  background: var(--bg-secondary);
  border-left: 1px solid var(--border-color);
  overflow-y: auto;
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  flex-direction: column;
  scrollbar-width: thin;
  scrollbar-color: var(--border-color) transparent;
}

#node-detail-panel.open {
  transform: translateX(0);
}

.panel-header {
  padding: 16px;
  border-bottom: 1px solid var(--border-color);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: var(--bg-secondary);
  z-index: 5;
}

.panel-node-type {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 4px;
  margin-bottom: 4px;
}

.panel-node-type.product  { background: rgba(29,91,212,0.2); color: #58a6ff; }
.panel-node-type.meeting  { background: rgba(201,109,27,0.2); color: var(--accent-orange); }
.panel-node-type.note     { background: rgba(26,127,55,0.2); color: var(--accent-green); }
.panel-node-type.source   { background: rgba(126,69,194,0.2); color: var(--accent-purple); }

.panel-close-btn {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 18px;
  line-height: 1;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-sm);
  transition: var(--transition);
}

.panel-close-btn:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.panel-body {
  padding: 16px;
  flex: 1;
}

.panel-field {
  margin-bottom: 14px;
}

.panel-field-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.panel-field-value {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
  word-break: break-word;
}

.panel-field-value.highlight {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
}

.panel-section-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border-color);
  padding-bottom: 6px;
  margin: 16px 0 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.related-node-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
  cursor: pointer;
  transition: var(--transition);
}

.related-node-chip:hover {
  border-color: var(--accent-blue);
  background: var(--bg-hover);
}

.related-node-chip .chip-icon { font-size: 12px; }
.related-node-chip .chip-label { font-size: 12px; color: var(--text-secondary); flex: 1; }
.related-node-chip .chip-type  { font-size: 10px; color: var(--text-muted); }

/* エッジ追加フォーム */
#edge-form-panel {
  padding: 12px 16px;
  border-top: 1px solid var(--border-color);
  background: var(--bg-card);
}

/* ─── ダッシュボード統計カード ─── */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  padding: 20px;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--stat-color, var(--accent-blue));
}

.stat-card:hover {
  border-color: var(--stat-color, var(--accent-blue));
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}

.stat-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 10px;
}

.stat-value {
  font-size: 32px;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1;
  margin-bottom: 4px;
}

.stat-sub {
  font-size: 11px;
  color: var(--text-muted);
}

/* ─── カード ─── */
.glass-card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.card-head {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border-color);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card-head h2 {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 8px;
}

.card-body { padding: 20px; }

/* ─── フォーム ─── */
.form-group { margin-bottom: 16px; }

.form-label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
}

.form-control, .form-select {
  width: 100%;
  background: var(--bg-primary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  padding: 9px 12px;
  font-size: 13px;
  font-family: var(--font-base);
  transition: var(--transition);
  outline: none;
}

.form-control::placeholder { color: var(--text-muted); }

.form-control:focus, .form-select:focus {
  border-color: var(--accent-blue);
  box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
  background: var(--bg-secondary);
}

.form-select option { background: var(--bg-card); }

textarea.form-control { resize: vertical; min-height: 80px; }

/* ─── ボタン ─── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  font-family: var(--font-base);
  cursor: pointer;
  border: none;
  transition: var(--transition);
  text-decoration: none;
  line-height: 1.4;
}

.btn-primary {
  background: var(--accent-blue);
  color: #000;
}
.btn-primary:hover { background: #79c0ff; transform: translateY(-1px); }

.btn-secondary {
  background: var(--bg-hover);
  color: var(--text-primary);
  border: 1px solid var(--border-color);
}
.btn-secondary:hover { background: #3d444d; border-color: var(--text-secondary); }

.btn-danger {
  background: rgba(248,81,73,0.15);
  color: var(--accent-red);
  border: 1px solid rgba(248,81,73,0.3);
}
.btn-danger:hover { background: rgba(248,81,73,0.25); }

.btn-success {
  background: rgba(63,185,80,0.15);
  color: var(--accent-green);
  border: 1px solid rgba(63,185,80,0.3);
}
.btn-success:hover { background: rgba(63,185,80,0.25); }

.btn-sm {
  padding: 5px 10px;
  font-size: 11px;
}

.btn-icon {
  width: 30px;
  height: 30px;
  padding: 0;
  justify-content: center;
}

.btn-block { width: 100%; justify-content: center; }

/* ─── 通知 ─── */
#toast-container {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: flex-end;
}

.toast {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  padding: 12px 16px;
  font-size: 13px;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  animation: slideInRight 0.3s ease;
  max-width: 320px;
}

.toast.success { border-left: 3px solid var(--accent-green); }
.toast.error   { border-left: 3px solid var(--accent-red); }
.toast.info    { border-left: 3px solid var(--accent-blue); }

@keyframes slideInRight {
  from { opacity: 0; transform: translateX(30px); }
  to   { opacity: 1; transform: translateX(0); }
}

/* ─── ローディング ─── */
#global-loader {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
  z-index: 9999;
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.4s ease;
}
#global-loader.loading {
  transform: scaleX(0.7);
  animation: loadPulse 1.5s infinite;
}
#global-loader.done { transform: scaleX(1); opacity: 0; transition: transform 0.2s, opacity 0.3s 0.2s; }

@keyframes loadPulse {
  0%   { transform: scaleX(0.1); opacity: 1; }
  50%  { transform: scaleX(0.7); opacity: 0.8; }
  100% { transform: scaleX(0.9); opacity: 1; }
}

/* ─── テーブル ─── */
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}

.data-table th {
  background: var(--bg-hover);
  color: var(--text-secondary);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 10px 12px;
  text-align: left;
  border-bottom: 1px solid var(--border-color);
  position: sticky;
  top: 0;
}

.data-table td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border-subtle);
  color: var(--text-secondary);
  vertical-align: middle;
}

.data-table tr:hover td { background: var(--bg-hover); }

.data-table td[contenteditable="true"] {
  cursor: text;
  border-radius: 3px;
  transition: background 0.15s;
}
.data-table td[contenteditable="true"]:focus {
  background: var(--bg-hover);
  outline: 1px solid var(--accent-blue);
  color: var(--text-primary);
}

/* ─── AI回答エリア ─── */
.ai-response-area {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  padding: 20px;
  font-size: 13px;
  line-height: 1.8;
  color: var(--text-secondary);
}

.ai-response-area p { margin-bottom: 0.8rem; }
.ai-response-area strong { color: var(--accent-blue); font-weight: 600; }

/* モード切り替えボタン */
.mode-btn-group {
  display: flex;
  gap: 0;
  border: 1px solid var(--border-color);
  border-radius: var(--radius-sm);
  overflow: hidden;
}

.mode-btn {
  flex: 1;
  padding: 8px 12px;
  background: transparent;
  border: none;
  border-right: 1px solid var(--border-color);
  color: var(--text-secondary);
  font-size: 12px;
  font-weight: 600;
  font-family: var(--font-base);
  cursor: pointer;
  transition: var(--transition);
}
.mode-btn:last-child { border-right: none; }
.mode-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.mode-btn.active {
  background: rgba(88,166,255,0.15);
  color: var(--accent-blue);
}

/* ─── バッジ ─── */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 700;
}

.badge-blue   { background: rgba(88,166,255,0.15); color: var(--accent-blue); }
.badge-orange { background: rgba(240,136,62,0.15); color: var(--accent-orange); }
.badge-green  { background: rgba(63,185,80,0.15); color: var(--accent-green); }
.badge-purple { background: rgba(188,140,255,0.15); color: var(--accent-purple); }
.badge-red    { background: rgba(248,81,73,0.15); color: var(--accent-red); }

/* ─── タブコンテンツ ─── */
.tab-pane {
  display: none;
  animation: fadeUp 0.25s ease;
}
.tab-pane.active { display: block; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* グラフタブは特殊 */
#tab-graph {
  height: calc(100vh - 0px);
  overflow: hidden;
}

/* ─── プログレスバー ─── */
.progress-bar-wrap {
  background: var(--bg-hover);
  border-radius: 4px;
  overflow: hidden;
  height: 6px;
  margin-top: 6px;
}
.progress-bar-fill {
  height: 100%;
  border-radius: 4px;
  background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
  transition: width 0.6s ease;
}

/* ─── リスト ─── */
.item-list { list-style: none; }
.item-list-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--border-subtle);
  gap: 10px;
}
.item-list-item:last-child { border-bottom: none; }

/* ─── モーダル ─── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.modal-overlay.open { opacity: 1; pointer-events: auto; }

.modal-box {
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  width: 90%;
  max-width: 480px;
  max-height: 90vh;
  overflow-y: auto;
  transform: scale(0.95);
