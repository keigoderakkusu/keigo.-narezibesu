<style>
/* ==========================================
   CSS.html v2.0
   ナレッジグラフ Hub — ダークグラスモーフィズム
   ミニマリスト & Obsidianインスパイアード
   ========================================== */

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');

:root {
  --font-base: 'Inter', 'Noto Sans JP', sans-serif;

  /* ダークカラーパレット */
  --bg-primary:    #0d1117;
  --bg-secondary:  #161b22;
  --bg-card:       #21262d;
  --bg-hover:      #30363d;
  --border-color:  #30363d;
  --border-subtle: #21262d;

  /* アクセントカラー */
  --accent-blue:   #58a6ff;
  --accent-orange: #f0883e;
  --accent-green:  #3fb950;
  --accent-purple: #bc8cff;
  --accent-red:    #f85149;
  --accent-cyan:   #39d353;

  /* テキスト */
  --text-primary:  #f0f6fc;
  --text-secondary:#8b949e;
  --text-muted:    #6e7681;

  /* グラフノード色 */
  --node-product:  #1d5bd4;
  --node-meeting:  #c96d1b;
  --node-note:     #1a7f37;
  --node-source:   #7e45c2;

  /* グラスモーフィズム */
  --glass-bg:      rgba(33, 38, 45, 0.85);
  --glass-border:  rgba(255, 255, 255, 0.08);
  --glass-blur:    12px;

  --radius-sm:  6px;
  --radius-md:  10px;
  --radius-lg:  16px;
  --sidebar-w:  240px;
  --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ─── リセット & ベース ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { height: 100%; scroll-behavior: smooth; }

body {
  font-family: var(--font-base);
  background-color: var(--bg-primary);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
  height: 100%;
  overflow: hidden; /* レイアウト最優先 */
}

/* ─── アプリシェル (サイドバー + メイン) ─── */
#app-shell {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ─── サイドバー ─── */
#sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--bg-secondary);
  border-right: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width 0.25s ease;
  z-index: 100;
}

.sidebar-brand {
  padding: 20px 16px 16px;
  border-bottom: 1px solid var(--border-color);
  display: flex;
  align-items: center;
  gap: 10px;
}

.sidebar-brand .brand-icon {
  width: 34px;
  height: 34px;
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.sidebar-brand .brand-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.2;
}

.sidebar-brand .brand-version {
  font-size: 10px;
  color: var(--text-muted);
}

.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 12px 8px;
  scrollbar-width: thin;
  scrollbar-color: var(--border-color) transparent;
}

.sidebar-section-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 8px 8px 4px;
}

.sidebar-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
  text-decoration: none;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  margin-bottom: 2px;
}

.sidebar-item:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.sidebar-item.active {
  background: rgba(88, 166, 255, 0.15);
  color: var(--accent-blue);
  font-weight: 600;
}

.sidebar-item .item-icon {
  font-size: 14px;
  flex-shrink: 0;
  width: 16px;
  text-align: center;
}

.sidebar-item .item-badge {
  margin-left: auto;
  background: var(--bg-hover);
  color: var(--text-muted);
  font-size: 10px;
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 10px;
}

.sidebar-item.active .item-badge {
  background: rgba(88, 166, 255, 0.25);
  color: var(--accent-blue);
}

.sidebar-footer {
  padding: 12px 8px;
  border-top: 1px solid var(--border-color);
}

/* ─── メインコンテンツ ─── */
#main-content {
  flex: 1;
  overflow-y: auto;
  background: var(--bg-primary);
  scrollbar-width: thin;
  scrollbar-color: var(--border-color) transparent;
}

.page-header {
  padding: 24px 28px 0;
  border-bottom: 1px solid var(--border-color);
  background: var(--bg-secondary);
  margin-bottom: 24px;
}

.page-header h1 {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 4px;
}

.page-header .page-desc {
  font-size: 13px;
  color: var(--text-secondary);
  padding-bottom: 14px;
}

.page-body {
  padding: 0 28px 32px;
}

/* ─── ナレッジグラフビュー ─── */
#graph-container {
  position: relative;
  height: calc(100vh - 60px);
  display: flex;
  overflow: hidden;
}

#graph-canvas-wrapper {
  flex: 1;
  position: relative;
  background: var(--bg-primary);
  overflow: hidden;
}

#knowledge-graph {
  width: 100%;
  height: 100%;
  background: radial-gradient(ellipse at center, #0d1f3c 0%, var(--bg-primary) 70%);
}

/* グラフコントロールツールバー */
#graph-toolbar {
  position: absolute;
  top: 12px;
  left: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  z-index: 10;
  flex-wrap: wrap;
}

.graph-control-btn {
  background: var(--glass-bg);
  backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--glass-border);
  color: var(--text-primary);
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  gap: 6px;
}

.graph-control-btn:hover {
  background: var(--bg-hover);
  border-color: var(--accent-blue);
  color: var(--accent-blue);
}

.graph-control-btn.active {
  background: rgba(88, 166, 255, 0.15);
  border-color: var(--accent-blue);
  color: var(--accent-blue);
}

/* 凡例 */
#graph-legend {
  position: absolute;
  bottom: 16px;
  left: 16px;
  background: var(--glass-bg);
  backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-md);
  padding: 10px 14px;
  z-index: 10;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--text-secondary);
  margin-bottom: 4px;
}

.legend-item:last-child { margin-bottom: 0; }

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ノード詳細パネル */
#node-detail-panel {
  width: 320px;
  min-width: 320px;
  background: var(--bg-secondary);
  border-left: 1px solid var(--border-color);
  overflow-y: auto;
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  flex-direction: column;
  scrollbar-width: thin;
  scrollbar-color: var(--border-color) transparent;
}

#node-detail-panel.open {
  transform: translateX(0);
}

.panel-header {
  padding: 16px;
  border-bottom: 1px solid var(--border-color);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: var(--bg-secondary);
  z-index: 5;
}

.panel-node-type {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 4px;
  margin-bottom: 4px;
}

.panel-node-type.product  { background: rgba(29,91,212,0.2); color: #58a6ff; }
.panel-node-type.meeting  { background: rgba(201,109,27,0.2); color: var(--accent-orange); }
.panel-node-type.note     { background: rgba(26,127,55,0.2); color: var(--accent-green); }
.panel-node-type.source   { background: rgba(126,69,194,0.2); color: var(--accent-purple); }

.panel-close-btn {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 18px;
  line-height: 1;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-sm);
  transition: var(--transition);
}

.panel-close-btn:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.panel-body {
  padding: 16px;
  flex: 1;
}

.panel-field {
  margin-bottom: 14px;
}

.panel-field-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.panel-field-value {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
  word-break: break-word;
}

.panel-field-value.highlight {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
}

.panel-section-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border-color);
  padding-bottom: 6px;
  margin: 16px 0 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.related-node-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
  cursor: pointer;
  transition: var(--transition);
}

.related-node-chip:hover {
  border-color: var(--accent-blue);
  background: var(--bg-hover);
}

.related-node-chip .chip-icon { font-size: 12px; }
.related-node-chip .chip-label { font-size: 12px; color: var(--text-secondary); flex: 1; }
.related-node-chip .chip-type  { font-size: 10px; color: var(--text-muted); }

/* エッジ追加フォーム */
#edge-form-panel {
  padding: 12px 16px;
  border-top: 1px solid var(--border-color);
  background: var(--bg-card);
}

/* ─── ダッシュボード統計カード ─── */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  padding: 20px;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--stat-color, var(--accent-blue));
}

.stat-card:hover {
  border-color: var(--stat-color, var(--accent-blue));
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}

.stat-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 10px;
}

.stat-value {
  font-size: 32px;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1;
  margin-bottom: 4px;
}

.stat-sub {
  font-size: 11px;
  color: var(--text-muted);
}

/* ─── カード ─── */
.glass-card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.card-head {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border-color);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card-head h2 {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 8px;
}

.card-body { padding: 20px; }

/* ─── フォーム ─── */
.form-group { margin-bottom: 16px; }

.form-label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
}

.form-control, .form-select {
  width: 100%;
  background: var(--bg-primary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  padding: 9px 12px;
  font-size: 13px;
  font-family: var(--font-base);
  transition: var(--transition);
  outline: none;
}

.form-control::placeholder { color: var(--text-muted); }

.form-control:focus, .form-select:focus {
  border-color: var(--accent-blue);
  box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
  background: var(--bg-secondary);
}

.form-select option { background: var(--bg-card); }

textarea.form-control { resize: vertical; min-height: 80px; }

/* ─── ボタン ─── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  font-family: var(--font-base);
  cursor: pointer;
  border: none;
  transition: var(--transition);
  text-decoration: none;
  line-height: 1.4;
}

.btn-primary {
  background: var(--accent-blue);
  color: #000;
}
.btn-primary:hover { background: #79c0ff; transform: translateY(-1px); }

.btn-secondary {
  background: var(--bg-hover);
  color: var(--text-primary);
  border: 1px solid var(--border-color);
}
.btn-secondary:hover { background: #3d444d; border-color: var(--text-secondary); }

.btn-danger {
  background: rgba(248,81,73,0.15);
  color: var(--accent-red);
  border: 1px solid rgba(248,81,73,0.3);
}
.btn-danger:hover { background: rgba(248,81,73,0.25); }

.btn-success {
  background: rgba(63,185,80,0.15);
  color: var(--accent-green);
  border: 1px solid rgba(63,185,80,0.3);
}
.btn-success:hover { background: rgba(63,185,80,0.25); }

.btn-sm {
  padding: 5px 10px;
  font-size: 11px;
}

.btn-icon {
  width: 30px;
  height: 30px;
  padding: 0;
  justify-content: center;
}

.btn-block { width: 100%; justify-content: center; }

/* ─── 通知 ─── */
#toast-container {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: flex-end;
}

.toast {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  padding: 12px 16px;
  font-size: 13px;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  animation: slideInRight 0.3s ease;
  max-width: 320px;
}

.toast.success { border-left: 3px solid var(--accent-green); }
.toast.error   { border-left: 3px solid var(--accent-red); }
.toast.info    { border-left: 3px solid var(--accent-blue); }

@keyframes slideInRight {
  from { opacity: 0; transform: translateX(30px); }
  to   { opacity: 1; transform: translateX(0); }
}

/* ─── ローディング ─── */
#global-loader {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
  z-index: 9999;
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.4s ease;
}
#global-loader.loading {
  transform: scaleX(0.7);
  animation: loadPulse 1.5s infinite;
}
#global-loader.done { transform: scaleX(1); opacity: 0; transition: transform 0.2s, opacity 0.3s 0.2s; }

@keyframes loadPulse {
  0%   { transform: scaleX(0.1); opacity: 1; }
  50%  { transform: scaleX(0.7); opacity: 0.8; }
  100% { transform: scaleX(0.9); opacity: 1; }
}

/* ─── テーブル ─── */
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}

.data-table th {
  background: var(--bg-hover);
  color: var(--text-secondary);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 10px 12px;
  text-align: left;
  border-bottom: 1px solid var(--border-color);
  position: sticky;
  top: 0;
}

.data-table td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border-subtle);
  color: var(--text-secondary);
  vertical-align: middle;
}

.data-table tr:hover td { background: var(--bg-hover); }

.data-table td[contenteditable="true"] {
  cursor: text;
  border-radius: 3px;
  transition: background 0.15s;
}
.data-table td[contenteditable="true"]:focus {
  background: var(--bg-hover);
  outline: 1px solid var(--accent-blue);
  color: var(--text-primary);
}

/* ─── AI回答エリア ─── */
.ai-response-area {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  padding: 20px;
  font-size: 13px;
  line-height: 1.8;
  color: var(--text-secondary);
}

.ai-response-area p { margin-bottom: 0.8rem; }
.ai-response-area strong { color: var(--accent-blue); font-weight: 600; }

/* モード切り替えボタン */
.mode-btn-group {
  display: flex;
  gap: 0;
  border: 1px solid var(--border-color);
  border-radius: var(--radius-sm);
  overflow: hidden;
}

.mode-btn {
  flex: 1;
  padding: 8px 12px;
  background: transparent;
  border: none;
  border-right: 1px solid var(--border-color);
  color: var(--text-secondary);
  font-size: 12px;
  font-weight: 600;
  font-family: var(--font-base);
  cursor: pointer;
  transition: var(--transition);
}
.mode-btn:last-child { border-right: none; }
.mode-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.mode-btn.active {
  background: rgba(88,166,255,0.15);
  color: var(--accent-blue);
}

/* ─── バッジ ─── */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 700;
}

.badge-blue   { background: rgba(88,166,255,0.15); color: var(--accent-blue); }
.badge-orange { background: rgba(240,136,62,0.15); color: var(--accent-orange); }
.badge-green  { background: rgba(63,185,80,0.15); color: var(--accent-green); }
.badge-purple { background: rgba(188,140,255,0.15); color: var(--accent-purple); }
.badge-red    { background: rgba(248,81,73,0.15); color: var(--accent-red); }

/* ─── タブコンテンツ ─── */
.tab-pane {
  display: none;
  animation: fadeUp 0.25s ease;
}
.tab-pane.active { display: block; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* グラフタブは特殊 */
#tab-graph {
  height: calc(100vh - 0px);
  overflow: hidden;
}

/* ─── プログレスバー ─── */
.progress-bar-wrap {
  background: var(--bg-hover);
  border-radius: 4px;
  overflow: hidden;
  height: 6px;
  margin-top: 6px;
}
.progress-bar-fill {
  height: 100%;
  border-radius: 4px;
  background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
  transition: width 0.6s ease;
}

/* ─── リスト ─── */
.item-list { list-style: none; }
.item-list-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--border-subtle);
  gap: 10px;
}
.item-list-item:last-child { border-bottom: none; }

/* ─── モーダル ─── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.modal-overlay.open { opacity: 1; pointer-events: auto; }

.modal-box {
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  width: 90%;
  max-width: 480px;
  max-height: 90vh;
  overflow-y: auto;
  transform: scale(0.95);
  transition: transform 0.2s;
}
.modal-overlay.open .modal-box { transform: scale(1); }

.modal-head {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border-color);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-head h3 { font-size: 15px; font-weight: 700; color: var(--text-primary); }
.modal-body { padding: 20px; }
.modal-foot {
  padding: 14px 20px;
  border-top: 1px solid var(--border-color);
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}

/* ─── チャートラッパー ─── */
.chart-wrapper {
  position: relative;
  height: 200px;
}

/* ─── スクロールバー ─── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ─── レスポンシブ ─── */
@media (max-width: 768px) {
  #sidebar {
    position: fixed;
    left: -240px;
    top: 0;
    height: 100%;
    transition: left 0.25s ease;
    z-index: 200;
  }
  #sidebar.open { left: 0; }
  #mobile-toggle {
    position: fixed;
    top: 12px;
    left: 12px;
    z-index: 300;
    display: flex;
  }
  .page-header { padding: 16px; }
  .page-body { padding: 0 16px 24px; }
  #node-detail-panel { width: 100%; position: absolute; top: 0; right: 0; bottom: 0; z-index: 50; }
}

@media (min-width: 769px) {
  #mobile-toggle { display: none !important; }
}

/* ─── 印刷 ─── */
@media print {
  #sidebar, .graph-control-btn, .btn, #toast-container, #global-loader { display: none !important; }
  #main-content { overflow: visible; }
  body, .glass-card, .stat-card {
    background: #fff !important;
    color: #000 !important;
  }
}
.topbar-hamburger:hover { background: var(--bg-hover); }

.notion-breadcrumb { display: flex; align-items: center; gap: 4px; }
.bc-root { font-size: 13px; color: var(--text-muted); }
.bc-arrow { font-size: 11px; color: var(--text-muted); }
.bc-current { font-size: 13.5px; color: var(--text-primary); font-weight: 500; }

.topbar-right { display: flex; align-items: center; gap: 10px; }

/* Loading dots */
.loading-dots { display: flex; align-items: center; gap: 4px; }
.loading-dots span {
  width: 6px; height: 6px;
  background: var(--text-muted);
  border-radius: 50%;
  animation: dotBounce 1.2s ease-in-out infinite;
}
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotBounce {
  0%,80%,100% { transform: scale(0.7); opacity: 0.4; }
  40%         { transform: scale(1);   opacity: 1; }
}

/* Toast inline */
.toast-inline {
  font-size: 13px;
  color: var(--green);
  background: var(--green-soft);
  border-radius: var(--radius-sm);
  padding: 4px 10px;
  animation: fadeIn 0.2s;
}
@keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }

/* ===================== PAGE AREA ===================== */
#page-area {
  flex: 1;
  overflow-y: auto;
}

.notion-page {
  min-height: 100%;
  animation: pageIn 0.18s ease;
}
@keyframes pageIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: none; }
}

.page-body {
  max-width: 900px;
  margin: 0 auto;
  padding: 48px 96px 96px;
}

@media (max-width: 768px) {
  .page-body { padding: 32px 24px 64px; }
}

.page-emoji {
  font-size: 3rem;
  margin-bottom: 12px;
  line-height: 1;
}
.page-h1 {
  font-size: 2rem;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 4px;
  line-height: 1.2;
}
.page-lead {
  font-size: 15px;
  color: var(--text-secondary);
  margin-bottom: 28px;
}

/* ===================== STATS ===================== */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 12px;
  margin: 24px 0;
}
.stat-card {
  background: var(--bg-hover);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px 20px;
  transition: box-shadow 0.15s;
}
.stat-card:hover { box-shadow: var(--shadow-sm); }
.stat-num {
  font-size: 2rem;
  font-weight: 700;
  color: var(--text-primary);
  font-variant-numeric: tabular-nums;
}
.stat-lbl {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 2px;
}

/* ===================== NOTION DIVIDER ===================== */
.notion-divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 28px 0 16px;
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.notion-divider::before, .notion-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ===================== CHARTS ===================== */
.charts-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 24px;
}
.chart-block {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px 20px;
}
.chart-lbl {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* ===================== CALLOUT ===================== */
.callout-notion {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  background: var(--bg-hover);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 14px 16px;
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 4px;
}
.callout-notion > span { font-size: 1.1em; flex-shrink: 0; margin-top: 1px; }

/* ===================== DATABASE TABLE ===================== */
.db-actions-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 20px 0 8px;
  flex-wrap: wrap;
}
.db-search-input {
  flex: 1; min-width: 140px;
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13.5px;
  font-family: var(--font);
  background: var(--bg);
  outline: none;
  color: var(--text-primary);
}
.db-search-input:focus { border-color: var(--accent); }
.db-filter-sel {
  padding: 5px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text-primary);
  outline: none;
  cursor: pointer;
}
.db-row-count {
  font-size: 12px;
  color: var(--text-muted);
  white-space: nowrap;
}
.db-action-btns { display: flex; gap: 4px; }

.db-table-wrap {
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  overflow-x: auto;
}
.db-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13.5px;
}
.db-table thead tr {
  background: var(--bg-hover);
}
.db-table th {
  padding: 8px 12px;
  text-align: left;
  font-size: 11.5px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.db-table td {
  padding: 0;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
  position: relative;
}
.db-table tr:last-child td { border-bottom: none; }
.db-table tbody tr { transition: background 0.1s; }
.db-table tbody tr:hover { background: var(--bg-hover); }

/* Inline editable cell */
.cell-wrap {
  display: block;
  padding: 8px 12px;
  min-height: 36px;
  outline: none;
  white-space: pre-wrap;
  word-break: break-word;
  cursor: text;
  color: var(--text-primary);
  border-radius: 0;
}
.cell-wrap:focus {
  background: var(--accent-soft);
  box-shadow: inset 0 0 0 2px var(--accent);
  border-radius: var(--radius-sm);
}
.cell-wrap.saving { opacity: 0.5; pointer-events: none; }

/* Primary cell (title) */
.cell-primary {
  font-weight: 500;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  cursor: pointer;
}
.cell-open-icon {
  opacity: 0;
  font-size: 12px;
  color: var(--text-muted);
  margin-left: auto;
  flex-shrink: 0;
  transition: opacity 0.1s;
}
.db-table tbody tr:hover .cell-open-icon { opacity: 1; }

/* Status / tag badges */
.cell-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 100px;
  font-size: 11.5px;
  font-weight: 500;
  background: var(--bg-selected);
  color: var(--text-secondary);
}
.cell-badge.green  { background: var(--green-soft);  color: var(--green); }
.cell-badge.amber  { background: var(--amber-soft);  color: var(--amber); }
.cell-badge.blue   { background: var(--accent-soft); color: var(--accent); }
.cell-badge.red    { background: var(--red-soft);    color: var(--red); }

/* Add row button */
.db-add-row-btn {
  display: block;
  width: 100%;
  padding: 8px 12px;
  background: none;
  border: none;
  border-top: 1px solid var(--border);
  text-align: left;
  font-size: 13px;
  color: var(--text-muted);
  cursor: pointer;
  font-family: var(--font);
  transition: background 0.1s;
}
.db-add-row-btn:hover { background: var(--bg-hover); color: var(--text-secondary); }

/* ===================== BUTTONS ===================== */
.notion-btn-sm {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 10px;
  font-size: 13px; font-weight: 500;
  font-family: var(--font);
  background: var(--bg-hover);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  cursor: pointer;
  transition: background 0.1s, box-shadow 0.1s;
  white-space: nowrap;
}
.notion-btn-sm:hover { background: var(--bg-selected); box-shadow: var(--shadow-sm); }
.notion-btn-sm.ghost { background: none; border-color: transparent; color: var(--text-muted); }
.notion-btn-sm.ghost:hover { background: var(--bg-hover); border-color: var(--border); color: var(--text-primary); }

.notion-btn-primary-lg {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 18px;
  font-size: 14px; font-weight: 600;
  font-family: var(--font);
  background: var(--text-primary);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  transition: opacity 0.15s;
}
.notion-btn-primary-lg:hover { opacity: 0.85; }
.notion-btn-primary-lg:disabled { opacity: 0.5; cursor: not-allowed; }

/* ===================== NOTEBOOKLM LIST ===================== */
.nlm-list { display: flex; flex-direction: column; gap: 6px; }
.nlm-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  background: var(--bg);
  transition: box-shadow 0.15s;
}
.nlm-item:hover { box-shadow: var(--shadow-sm); }
.nlm-item-info { flex: 1; }
.nlm-item-name { font-weight: 500; font-size: 14px; }
.nlm-item-tag  { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.nlm-item-link {
  font-size: 12.5px; color: var(--accent); text-decoration: none;
  border: 1px solid var(--accent); border-radius: var(--radius-sm);
  padding: 3px 8px; white-space: nowrap;
}
.nlm-item-link:hover { background: var(--accent-soft); }

.empty-msg { text-align: center; color: var(--text-muted); font-size: 14px; padding: 40px 0; }

/* ===================== AI ===================== */
.ai-mode-toggle {
  display: flex; gap: 4px;
  background: var(--bg-hover);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 3px;
  width: fit-content;
}
.ai-mode-btn {
  padding: 5px 12px;
  font-size: 13px; font-family: var(--font);
  background: none; border: none;
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  cursor: pointer;
  transition: background 0.1s, color 0.1s;
}
.ai-mode-btn.active {
  background: var(--bg);
  color: var(--text-primary);
  font-weight: 500;
  box-shadow: var(--shadow-sm);
}

.ai-input-area {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  margin-top: 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 12px;
  background: var(--bg);
  transition: border-color 0.15s;
}
.ai-input-area:focus-within { border-color: var(--accent); }
.ai-textarea {
  flex: 1; border: none; outline: none; resize: none;
  font-family: var(--font); font-size: 14px;
  color: var(--text-primary); background: transparent;
  line-height: 1.6;
}
.ai-textarea::placeholder { color: var(--text-muted); }
.ai-send-btn {
  width: 34px; height: 34px;
  background: var(--text-primary); color: #fff;
  border: none; border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
  transition: opacity 0.15s;
}
.ai-send-btn:hover { opacity: 0.8; }
.ai-response-box {
  background: var(--bg-hover);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px 24px;
  font-size: 14.5px;
  line-height: 1.75;
  color: var(--text-primary);
}
.ai-response-box p  { margin-bottom: 10px; }
.ai-response-box p:last-child { margin-bottom: 0; }
.ai-response-box strong { font-weight: 600; }

/* ===================== CAREER ===================== */
.goal-card {
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px 20px;
  margin-bottom: 10px;
  background: var(--bg);
  transition: box-shadow 0.15s;
}
.goal-card:hover { box-shadow: var(--shadow-sm); }
.goal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.goal-title { font-weight: 600; font-size: 14.5px; }
.goal-pct { font-size: 12.5px; color: var(--text-muted); }
.goal-bar-track {
  height: 4px; background: var(--border); border-radius: 100px;
  margin-bottom: 8px;
}
.goal-bar-fill {
  height: 4px; background: var(--text-primary); border-radius: 100px;
}
.goal-kpi { font-size: 12.5px; color: var(--text-muted); }

/* ===================== FORM ===================== */
.notion-form-card {
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.form-prop-row {
  display: flex;
  align-items: flex-start;
  border-bottom: 1px solid var(--border);
  min-height: 40px;
}
.form-prop-row:last-child { border-bottom: none; }
.form-prop-label {
  width: 140px;
  flex-shrink: 0;
  padding: 10px 12px;
  font-size: 12.5px;
  color: var(--text-muted);
  font-weight: 500;
  background: var(--bg-hover);
  border-right: 1px solid var(--border);
  display: flex;
  align-items: center;
}
.form-prop-input {
  flex: 1;
  border: none;
  outline: none;
  padding: 10px 12px;
  font-family: var(--font);
  font-size: 14px;
  color: var(--text-primary);
  background: var(--bg);
  width: 100%;
}
.form-prop-input:focus { background: var(--accent-soft); }
.prop-label-sm {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 6px;
}

/* ===================== ROW DETAIL PANEL ===================== */
.row-panel-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.35);
  z-index: 1000;
  display: flex;
  justify-content: flex-end;
  animation: overlayIn 0.15s ease;
}
@keyframes overlayIn { from { opacity:0; } to { opacity:1; } }

.row-panel {
  width: 560px;
  max-width: 100%;
  height: 100%;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-lg);
  animation: panelIn 0.2s ease;
  overflow: hidden;
}
@keyframes panelIn {
  from { transform: translateX(40px); opacity:0; }
  to   { transform: none; opacity:1; }
}

.row-panel-topbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.row-panel-close {
  background: none; border: none; cursor: pointer;
  color: var(--text-muted); padding: 4px; border-radius: 4px;
  display: flex; align-items: center; font-size: 15px;
}
.row-panel-close:hover { background: var(--bg-hover); color: var(--text-primary); }
.row-panel-breadcrumb {
  flex: 1; font-size: 12.5px; color: var(--text-muted);
}
.danger-btn {
  background: none; border: 1px solid transparent;
  color: var(--text-muted); padding: 4px 8px;
  font-size: 12.5px; border-radius: var(--radius-sm);
  cursor: pointer; display: flex; align-items: center; gap: 4px;
  font-family: var(--font);
}
.danger-btn:hover { background: var(--red-soft); color: var(--red); border-color: var(--red); }

.row-panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 32px 40px;
}
.row-panel-emoji {
  font-size: 2.5rem;
  margin-bottom: 8px;
}
.row-panel-title {
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--text-primary);
  outline: none;
  margin-bottom: 20px;
  line-height: 1.25;
  cursor: text;
  border-bottom: 2px solid transparent;
  padding-bottom: 4px;
  transition: border-color 0.15s;
}
.row-panel-title:focus { border-bottom-color: var(--accent); }
.row-panel-title:empty::before {
  content: 'タイトルを入力...';
  color: var(--text-muted);
  pointer-events: none;
}

.row-panel-props { display: flex; flex-direction: column; }
.panel-prop-row {
  display: flex;
  align-items: flex-start;
  min-height: 36px;
  padding: 4px 0;
  border-radius: var(--radius-sm);
  transition: background 0.1s;
}
.panel-prop-row:hover { background: var(--bg-hover); }
.panel-prop-key {
  width: 160px;
  flex-shrink: 0;
  font-size: 13px;
  color: var(--text-muted);
  padding: 6px 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.panel-prop-val {
  flex: 1;
  font-size: 14px;
  color: var(--text-primary);
  padding: 6px 8px;
  outline: none;
  border-radius: var(--radius-sm);
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-word;
  cursor: text;
  min-height: 32px;
}
.panel-prop-val:focus {
  background: var(--accent-soft);
  box-shadow: inset 0 0 0 2px var(--accent);
}
.panel-prop-val:empty::before {
  content: attr(data-placeholder);
  color: var(--text-muted);
  pointer-events: none;
}
.panel-prop-val.saving { opacity: 0.5; }

/* ===================== DOCUMENT TREE ===================== */
.company-card {
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  margin-bottom: 12px;
  overflow: hidden;
}
.company-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  background: var(--bg-hover);
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  user-select: none;
}
.company-header:hover { background: var(--bg-selected); }
.company-name {
  font-weight: 600;
  font-size: 14.5px;
  flex: 1;
}
.company-meta { font-size: 12px; color: var(--text-muted); }
.company-badge {
  font-size: 11px;
  padding: 2px 7px;
  border-radius: 100px;
  font-weight: 500;
}
.badge-hq { background: var(--accent-soft); color: var(--accent); }
.badge-branch { background: var(--amber-soft); color: var(--amber); }

.company-body { padding: 12px 16px; }

.month-node { margin-bottom: 10px; }
.month-label {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 8px;
  font-size: 12.5px;
  font-weight: 600;
  color: var(--text-secondary);
  background: var(--bg-hover);
  border-radius: var(--radius-sm);
  margin-bottom: 4px;
  cursor: pointer;
}
.month-label:hover { background: var(--bg-selected); }
.month-count {
  margin-left: auto;
  font-size: 11px;
  color: var(--text-muted);
  background: var(--bg-selected);
  padding: 1px 6px;
  border-radius: 100px;
}

.file-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 8px 5px 20px;
  font-size: 13px;
  border-radius: var(--radius-sm);
  transition: background 0.1s;
}
.file-row:hover { background: var(--bg-hover); }
.file-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-type-badge {
  font-size: 11px;
